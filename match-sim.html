function triggerSpecialEvent(teamName, teamSide) {
  const evt = TEAM_SPECIAL_EVENTS[teamName];
  if (!evt || specialEventActive) return;

  specialEventActive = true;
  specialEventsFired[teamSide] = true;
  specialSlowMo = 0.12; // extreme slow motion
  specialEventTimer = 480; // 8 seconds at 60fps

  // Zoom camera to center pitch for full-screen overlay
  snapCamera(WORLD_W / 2, WORLD_H / 2);

  // KNOCK DOWN THE OPPOSING TEAM — all opponents fall over
  const opponents = teamSide === 'home' ? awayPlayers : homePlayers;
  const friendlies = teamSide === 'home' ? homePlayers : awayPlayers;
  opponents.forEach(p => {
    if (p.sentOff) return;
    p.state = 'diving'; // knocked down — horizontal + writhing
    p.stateTimer = 420; // stay down for 7 seconds
    p.slideX = (Math.random() - 0.5) * 6;
    p.slideY = (Math.random() - 0.5) * 4;
    // Visual stars around their heads
    addEffect('stars', p.x, p.y);
  });

  // Friendly team celebrates
  friendlies.forEach(p => {
    if (p.sentOff || p.position === 'GK') return;
    p.state = 'celebrating';
    p.stateTimer = 400;
  });

  // Commentary
  addCommentary('comedy', `=== ${evt.title} ===`);
  setTimeout(() => addCommentary('comedy', evt.desc), 2000);
  setTimeout(() => addCommentary('comedy', `The ${teamSide === 'home' ? awayTeamName : homeTeamName} players are on the floor! DEVASTATED!`), 4000);

  // Draw overlay effect — 8 seconds
  addEffect('special_event', WORLD_W/2, WORLD_H/2, {
    duration: 8,
    icon: evt.icon,
    title: evt.title,
    desc: evt.desc,
    zoom: evt.zoom,
    teamName: teamName,
    screenSpace: true,
  });

  AudioManager.playGoal(); // dramatic sound
  setTimeout(() => AudioManager.playWhistle(true), 2000); // dramatic whistle

  // Resume normal speed after event
  setTimeout(() => {
    specialEventActive = false;
    specialSlowMo = 1;
    // Get opponents back up
    opponents.forEach(p => { if (p.state === 'diving') p.state = 'idle'; p.slideX = 0; p.slideY = 0; });
    friendlies.forEach(p => { if (p.state === 'celebrating') p.state = 'idle'; });
  }, 8000);
}

// Check if special events should fire (guaranteed 1 per team, around minutes 25-35 and 60-75)
function checkSpecialEvents() {
  if (specialEventActive || gameState !== 'playing') return;

  // Home team event: fire between minute 25-35 if not yet fired
  if (!specialEventsFired.home && matchClock >= 25 && matchClock < 36) {
    if (Math.random() < 0.008) { // ~once in that window
      triggerSpecialEvent(homeTeamName, 'home');
      return;
    }
  }
  // Force home event by minute 36 if still not fired
  if (!specialEventsFired.home && matchClock >= 36 && matchClock < 45) {
    triggerSpecialEvent(homeTeamName, 'home');
    return;
  }

  // Away team event: fire between minute 60-75
  if (!specialEventsFired.away && matchClock >= 60 && matchClock < 76) {
    if (Math.random() < 0.008) {
      triggerSpecialEvent(awayTeamName, 'away');
      return;
    }
  }
  // Force away event by minute 76
  if (!specialEventsFired.away && matchClock >= 76 && matchClock < 85) {
    triggerSpecialEvent(awayTeamName, 'away');
    return;
  }
}

// ---- COMMENTARY ----
function addCommentary(type, text) {
  if (!text) return;
  lastCommentaryTime = Date.now();
  const minute = Math.floor(matchClock);
  const el = $('commentary');
  const cls = type === 'goal' ? 'goal' : type === 'card' ? 'card' : type === 'comedy' ? 'comedy' : type === 'var' ? 'var' : type === 'info' ? '' : '';
  const div = document.createElement('div');
  div.className = 'event ' + cls;
  div.innerHTML = `<span class="min">${minute}'</span>${text}`;
  el.insertBefore(div, el.firstChild);
  // Trim old
  while (el.children.length > 50) el.removeChild(el.lastChild);
}

// ---- SCOREBOARD ----
function updateScoreboard() {
  const newScore = `${homeScore} – ${awayScore}`;
  if (newScore !== _prevSbScore) { $('sbScore').textContent = newScore; _prevSbScore = newScore; }
  const newClock = `${Math.floor(matchClock)}'`;
  if (newClock !== _prevSbClock) { $('clockDisplay').textContent = newClock; _prevSbClock = newClock; }
}

// ---- MAIN GAME LOOP ----
function gameLoop() {
  animId = requestAnimationFrame(gameLoop);

  // Frame timing measurement
  const _now = performance.now();
  if (_lastFrameTime) {
    const dt = _now - _lastFrameTime;
    const fs = window.FRAME_STATS;
    fs.times.push(dt);
    if (fs.times.length > 60) fs.times.shift();
    const sum = fs.times.reduce((a,b)=>a+b,0);
    fs.mean = sum / fs.times.length;
    fs.min = Math.min(...fs.times);
    fs.max = Math.max(...fs.times);
  }
   _lastFrameTime = _now;

  const frameTime = Date.now();

  if (gameState === 'teamSelect' || gameState === 'fulltime') return;

  // Lineup animation — move players to positions + render
  if (gameState === 'lineup') {
    allPlayers.forEach(p => {
      if (p.targetX !== undefined) {
        const dx = p.targetX - p.x, dy = p.targetY - p.y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d > 3) { p.vx = (dx/d)*3; p.vy = (dy/d)*3; p.x += p.vx; p.y += p.vy; }
        else { p.vx = 0; p.vy = 0; }
      }
    });
    updateCamera();
    drawFrame(frameTime);
    return;
  }

  // VAR pause
  if (varActive) {
    varTimer--;
    if (varTimer <= 0) {
      varActive = false;
      addCommentary('var', `VAR decision: ${varResult}`);
      if (varResult === 'PENALTY!') {
        // Award penalty to the team that was attacking (had ball possession recently)
        const penTeam = lastPossessionTeam !== undefined ? lastPossessionTeam : (Math.random() < 0.5 ? 0 : 1);
        triggerPenaltyKick(penTeam, null);
      }
    }
    drawFrame(frameTime);
    return;
  }

  // Pause (goal celebration, halftime)
  if (pauseTimer > 0) {
    pauseTimer--;
    if (pauseTimer <= 0) {
      if (gameState === 'goalScored') {
        gameState = 'playing';
        resetPositions();
      } else if (gameState === 'halftime') {
        gameState = 'playing';
        // Swap sides
        swapSides();
        addCommentary('default', `Second half underway! ${awayTeamName} kick off.`);
      }
    }
    drawFrame(frameTime);
    return;
  }

  // Match clock
  if (gameState === 'playing') {
    // Apply slow motion during special events
    const tickInc = specialSlowMo < 1 ? specialSlowMo : 1;
    realTick += tickInc;
    matchClock = realTick / TICKS_PER_MINUTE;

    // Check for guaranteed team special events
    checkSpecialEvents();

    // Minimap zoom snap-back timer
    if (minimapZoomTimer > 0) {
      minimapZoomTimer--;
      if (minimapZoomTimer <= 0) {
        // Snap camera back to ball
        minimapZoomTarget = null;
      }
    }

    // Halftime
    if (!halfSwapped && matchClock >= 45) {
      AudioManager.playWhistle(false);
      AudioManager.setCrowd(0.05);
      gameState = 'halftime';
      halfSwapped = true;
      pauseTimer = 180;
      snapCamera(WORLD_W / 2, WORLD_H / 2);
      const htVars = {
        home: homeTeamName, away: awayTeamName,
        hs: homeScore, as: awayScore,
        home_nick: TEAM_NICKNAMES[homeTeamName] || homeTeamName,
        away_nick: TEAM_NICKNAMES[awayTeamName] || awayTeamName,
        anecdote: getTeamAnecdote(homeScore >= awayScore ? homeTeamName : awayTeamName),
      };
      addCommentary('info', pickComment('halftime', htVars));
      updateScoreboard();
      drawFrame(frameTime);
      return;
    }

    // Full time
    if (matchClock >= 90) {
      AudioManager.playWhistle(true);
      AudioManager.setCrowd(0.6);
      gameState = 'fulltime';
      const ftVars = {
        home: homeTeamName, away: awayTeamName,
        hs: homeScore, as: awayScore,
        home_nick: TEAM_NICKNAMES[homeTeamName] || homeTeamName,
        away_nick: TEAM_NICKNAMES[awayTeamName] || awayTeamName,
        anecdote: getTeamAnecdote(homeScore > awayScore ? homeTeamName : awayTeamName),
      };
      addCommentary('info', pickComment('fulltime', ftVars));
      updateScoreboard();
      showResult();
      return;
    }

    updateScoreboard();

    // Penalty kick in progress — blocks normal play
    if (penaltyState) {
      const blocking = updatePenaltyKick();
      // Still draw players moving during penalty
      for (const p of allPlayers) applyVelocity(p);
      updateCamera();
      drawFrame(frameTime);
      return;
    }

    // Update ball
    updateBall();

    // Track possession changes for visual arrow
    if (ball.owner) {
      const newTeam = ball.owner.team;
      if (lastPossessionTeam !== -1 && newTeam !== lastPossessionTeam) {
        // Possession changed teams — flash an arrow
        addEffect('possession_change', ball.x, ball.y, {
          fromTeam: lastPossessionTeam,
          toTeam: newTeam,
          playerName: ball.owner.lastName,
          duration: 1.2,
        });
      }
      lastPossessionTeam = newTeam;
    }

    // Update players
    const homeRoles = getChaseRoles(homePlayers);
    const awayRoles = getChaseRoles(awayPlayers);
    for (const p of homePlayers) { updatePlayerAI(p, homePlayers, awayPlayers, homeRoles); applyVelocity(p); }
    for (const p of awayPlayers) { updatePlayerAI(p, awayPlayers, homePlayers, awayRoles); applyVelocity(p); }

    // Update camera
    updateCamera();

    // Ball pickup (free ball)
    if (!ball.owner) {
      const all = allPlayers.filter(p => canAct(p));
      for (const p of all) {
        if (dist(p.x, p.y, ball.x, ball.y) < 20) {
          ball.owner = p; ball.lastTouchedBy = p;
          ball.free = false;
          p.state = 'hasBall';
          break;
        }
      }
    }

    // Crowd intensity modulation based on ball position
    if (realTick % 30 === 0) {
      const nearGoalTop = Math.max(0, 1 - dist(ball.x, ball.y, WORLD_W/2, PITCH_T) / 500);
      const nearGoalBot = Math.max(0, 1 - dist(ball.x, ball.y, WORLD_W/2, PITCH_B) / 500);
      AudioManager.setCrowd(0.15 + Math.max(nearGoalTop, nearGoalBot) * 0.5);
    }

    // Comedy events
    checkComedyEvents();

    // Idle commentary — team anecdotes between events
    if (Date.now() - lastCommentaryTime > IDLE_INTERVAL) {
      const idleTeam = Math.random() > 0.5 ? homeTeamName : awayTeamName;
      const anec = getTeamAnecdote(idleTeam);
      if (anec) addCommentary('info', anec);
    }

    // Pitch invader update
    if (pitchInvader) {
      pitchInvader.x += pitchInvader.vx;
      pitchInvader.y += pitchInvader.vy;
      pitchInvader.timer--;
      if (pitchInvader.steward) {
        moveToward(pitchInvader.steward, pitchInvader.x, pitchInvader.y, 2);
        pitchInvader.steward.x += (pitchInvader.x - pitchInvader.steward.x) * 0.02;
        pitchInvader.steward.y += (pitchInvader.y - pitchInvader.steward.y) * 0.02;
      }
      if (pitchInvader.timer <= 0 || pitchInvader.x > PITCH_R + 60) {
        pitchInvader = null;
        addCommentary('comedy', 'The pitch invader has been escorted off. Normal service resumes.');
      }
    }
  }

  drawFrame(frameTime);
}

function applyVelocity(p) {
  if (p.sentOff) return;
  p.x += p.vx;
  p.y += p.vy;
  p.vx *= 0.9;
  p.vy *= 0.9;

  // Keep on pitch (with slight margin for GKs)
  const margin = p.position === 'GK' ? -10 : 5;
  p.x = Math.max(PITCH_L + margin, Math.min(PITCH_R - margin, p.x));
  p.y = Math.max(PITCH_T + margin, Math.min(PITCH_B - margin, p.y));
}

function resetPositions() {
  for (const p of homePlayers) { p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0; if (p.state !== 'sentOff') p.state = 'idle'; }
  for (const p of awayPlayers) { p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0; if (p.state !== 'sentOff') p.state = 'idle'; }
  ball.x = WORLD_W / 2; ball.y = WORLD_H / 2; ball.vx = 0; ball.vy = 0; ball.owner = null; ball.free = true;
  snapCamera(WORLD_W / 2, WORLD_H / 2);
  buildAllPlayers();
}

function swapSides() {
  for (const p of homePlayers) {
    p.homeX = WORLD_W - p.homeX;
    p.homeY = WORLD_H - p.homeY;
  }
  for (const p of awayPlayers) {
    p.homeX = WORLD_W - p.homeX;
    p.homeY = WORLD_H - p.homeY;
  }
  resetPositions();
}

// ---- MINIMAP ----
function drawMinimap(frameTime = Date.now()) {
  const mw = 120, mh = 78;
  const mx = CW - mw - 10, my = CH - mh - 10;
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(mx, my, mw, mh);
  // Pitch outline
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx + 2, my + 2, mw - 4, mh - 4);
  // Camera viewport rect
  const vx = mx + (camera.x / WORLD_W) * mw;
  const vy = my + (camera.y / WORLD_H) * mh;
  const vw = (CW / WORLD_W) * mw;
  const vh = (CH / WORLD_H) * mh;
  ctx.strokeStyle = 'rgba(240,196,76,0.7)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);
  // Players as dots
  for (const p of allPlayers) {
    if (p.sentOff) continue;
    const px = mx + (p.x / WORLD_W) * mw;
    const py = my + (p.y / WORLD_H) * mh;
    ctx.fillStyle = p.team === 0 ? '#fff' : '#f0c44c';
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Ball
  const bx = mx + (ball.x / WORLD_W) * mw;
  const by = my + (ball.y / WORLD_H) * mh;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI * 2); ctx.fill();

  // Zoom target indicator (pulsing ring when minimap zoom is active)
  if (minimapZoomTimer > 0 && minimapZoomTarget) {
    const ztx = mx + (minimapZoomTarget.x / WORLD_W) * mw;
    const zty = my + (minimapZoomTarget.y / WORLD_H) * mh;
    const pulse = 3 + Math.sin(frameTime / 150) * 2;
    ctx.strokeStyle = `rgba(240,196,76,${0.5 + Math.sin(frameTime/200)*0.3})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ztx, zty, pulse, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = 1;
  }

  // "Click to explore" hint
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '6px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('click to explore', mx + mw/2, my + mh + 8);
}

function drawFrame(frameTime = Date.now()) {
  ctx.clearRect(0, 0, CW, CH);

  // === WORLD SPACE (camera-offset) ===
  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));

  drawPitch(ctx);
  const sortedPlayers = [...allPlayers].sort((a, b) => a.y - b.y);
  for (const p of sortedPlayers) drawPlayer(ctx, p, frameTime);
  drawReferee(ctx);
  drawBall(ctx, frameTime);
  drawPossessionArrow(ctx);
  drawPitchInvader(ctx);
  updateAndDrawEffects(frameTime); // Visual effects in world space

  ctx.restore();

  // === SCREEN SPACE (HUD) ===
  drawVAR(ctx);

  // VAR overlay text in screen space (from activeEffects)
  const varEffects = activeEffects.filter(e => e.type === 'var_overlay');
  if (varEffects.length > 0) {
    const age = (frameTime - varEffects[0].startTime) / 1000;
    if (age < varEffects[0].duration - 0.5) {
      ctx.fillStyle = 'rgba(180,0,255,0.9)';
      ctx.font = "bold 28px 'Anton', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText('VAR REVIEWING...', CW / 2, CW > 600 ? CH / 2 - 20 : CH / 2 - 10);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = "14px 'Space Mono', monospace";
      const messages = ['Checking handball...', 'Reviewing offside...', 'Checking for simulation...'];
      const idx = Math.floor(age * 2) % messages.length;
      ctx.fillText(messages[idx], CW / 2, CH / 2 + 14);
    } else if (age < varEffects[0].duration) {
      ctx.fillStyle = '#f0c44c';
      ctx.font = "bold 42px 'Anton', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(varResult || 'NO GOAL — squinting continues', CW / 2, CH / 2);
    }
  }

  // Red card screen flash (screen-space)
  const redFlash = activeEffects.find(e => e.type === 'red_flash');
  if (redFlash) {
    const age = (frameTime - redFlash.startTime) / 1000;
    if (age < 0.3) {
      ctx.fillStyle = `rgba(220,30,30,${0.3 * (1 - age / 0.3)})`;
      ctx.fillRect(0, 0, CW, CH);
    }
  }

  drawMinimap(frameTime);

  // Special team event overlay (cinematic — FILLS ENTIRE SCREEN)
  const specialEvt = activeEffects.find(e => e.type === 'special_event');
  if (specialEvt) {
    const age = (frameTime - specialEvt.startTime) / 1000;
    if (age < specialEvt.duration) {
      ctx.save();

      // SCREEN SHAKE — violent at start, settles
      const shakeIntensity = age < 1.5 ? (1.5 - age) * 6 : Math.sin(age * 8) * 1.5;
      ctx.translate(
        Math.sin(frameTime * 0.03) * shakeIntensity,
        Math.cos(frameTime * 0.04) * shakeIntensity
      );

      // FULL SCREEN dramatic overlay — near-total blackout
      const alpha = age < 0.5 ? age * 1.8 : (age > specialEvt.duration - 1.2 ? (specialEvt.duration - age) * 0.75 : 0.88);
      ctx.fillStyle = `rgba(0,0,0,${Math.min(0.92, alpha)})`;
      ctx.fillRect(-10, -10, CW + 20, CH + 20);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // GIANT canvas-drawn icon — MUCH bigger, pulsing, with glow
      const pulse = Math.sin(age * 3) * 0.2 + 1;
      const iconSize = Math.min(CW * 0.22, 160) * pulse;
      // Glow behind icon
      const gradient = ctx.createRadialGradient(CW/2, CH/2 - 50, 0, CW/2, CH/2 - 50, iconSize * 1.5);
      gradient.addColorStop(0, `rgba(240,196,76,${0.3 * alpha})`);
      gradient.addColorStop(1, 'rgba(240,196,76,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(CW/2 - iconSize*2, CH/2 - 50 - iconSize*2, iconSize*4, iconSize*4);
      drawSpecialIcon(ctx, specialEvt.data.icon, CW/2, CH/2 - 50, iconSize);

      // MASSIVE title — nearly full width, bouncing
      const titleBounce = age < 1 ? Math.pow(1 - age, 2) * 100 : 0;
      const titleSize = Math.min(CW * 0.12, 90) + Math.sin(age*2.5) * 6;
      ctx.fillStyle = '#f0c44c';
      ctx.font = `bold ${Math.round(titleSize)}px "Anton", sans-serif`;
      ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      ctx.lineWidth = 5;
      ctx.strokeText(specialEvt.data.title, CW/2, CH/2 + 50 + titleBounce);
      ctx.fillText(specialEvt.data.title, CW/2, CH/2 + 50 + titleBounce);
      ctx.lineWidth = 1;

      // Description — large, with typewriter fade-in
      const descChars = Math.floor(Math.max(0, age - 1.5) * 30);
      const descText = (specialEvt.data.desc || '').substring(0, descChars);
      if (descText) {
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.font = 'bold 18px "Space Mono", monospace';
        ctx.fillText(descText, CW/2, CH/2 + 110);
      }

      // Team name banner — full width gold bar
      const barAlpha = 0.4 + Math.sin(age * 4) * 0.2;
      ctx.fillStyle = `rgba(240,196,76,${barAlpha * 0.15})`;
      ctx.fillRect(0, CH/2 + 130, CW, 30);
      ctx.fillStyle = `rgba(240,196,76,${barAlpha})`;
      ctx.font = 'bold 14px "Space Mono", monospace';
      ctx.fillText(`=== ${specialEvt.data.teamName.toUpperCase()} SPECIAL EVENT ===`, CW/2, CH/2 + 145);

      // Animated DOUBLE border flash — thick gold frame
      const borderPhase = (age * 5) % (Math.PI * 2);
      const borderAlpha = 0.4 + Math.sin(borderPhase) * 0.3;
      ctx.strokeStyle = `rgba(240,196,76,${borderAlpha})`;
      ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, CW - 16, CH - 16);
      ctx.lineWidth = 2;
      ctx.strokeStyle = `rgba(255,255,255,${borderAlpha * 0.4})`;
      ctx.strokeRect(16, 16, CW - 32, CH - 32);
      ctx.lineWidth = 1;

      // CRT scanlines over the overlay for retro feel
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let y = 0; y < CH; y += 3) {
        ctx.fillRect(0, y, CW, 1);
      }

      // Slow-mo indicator — larger
      if (specialSlowMo < 0.5) {
        ctx.fillStyle = 'rgba(240,196,76,0.6)';
        ctx.font = 'bold 12px "Space Mono", monospace';
        ctx.textAlign = 'right';
        ctx.fillText('<<< SLOW MOTION >>>', CW - 15, CH - 15);
        ctx.textAlign = 'center';
      }

      ctx.restore();
    }
  }

  // Halftime overlay
  if (gameState === 'halftime') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#f0c44c';
    ctx.font = "bold 36px 'Anton', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('HALF TIME', CW / 2, CH / 2 - 10);
    ctx.font = "16px 'Space Mono', monospace";
    ctx.fillStyle = '#fff';
    ctx.fillText(`${homeTeamName} ${homeScore} – ${awayScore} ${awayTeamName}`, CW / 2, CH / 2 + 20);
  }

  // Goal scored overlay
  if (gameState === 'goalScored' && pauseTimer > 60) {
    ctx.fillStyle = 'rgba(240,196,76,0.15)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#f0c44c';
    ctx.font = "bold 48px 'Anton', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GOAL!', CW / 2, CH / 2);
  }

  // Frame stats debug overlay (press 'D' to toggle)
  if (window.FRAME_STATS.show) {
    const fs = window.FRAME_STATS;
    const fps = fs.mean > 0 ? Math.round(1000 / fs.mean) : 0;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(CW - 130, CH - 50, 125, 45);
    ctx.fillStyle = fps >= 55 ? '#44ff88' : fps >= 30 ? '#ffcc00' : '#ff4444';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(`FPS: ${fps}`, CW - 122, CH - 46);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.fillText(`mean:${fs.mean.toFixed(1)}ms`, CW - 122, CH - 32);
    ctx.fillText(`min:${fs.min.toFixed(1)} max:${fs.max.toFixed(1)}`, CW - 122, CH - 22);
    ctx.restore();
  }
}

  // Man of the match
  const motmCandidates = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff);
  let motm = motmCandidates.sort((a, b) => b.goals - a.goals)[0];
  const funnyReasons = [
    'Most hair-ruffling celebrations',
    'Least offside decisions against them',

// ---- KICK OFF ----
async function startMatch() {
  homeTeamName = $('homeSelect').value;
  awayTeamName = $('awaySelect').value;

  $('teamSelect').classList.add('hidden');
  $('matchView').classList.add('active');

  canvas = $('pitchCanvas');
  ctx = canvas.getContext('2d');

  // User click interaction
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (CW / rect.width);
    const sy = (e.clientY - rect.top) * (CH / rect.height);
    // Check if click is on minimap
    const mmx = CW - 130, mmy = CH - 88, mmw = 120, mmh = 78;
    if (sx >= mmx && sx <= mmx + mmw && sy >= mmy && sy <= mmy + mmh) {
      handleMinimapClick(sx - mmx, sy - mmy, mmw, mmh);
      return;
    }
    const wx = sx + camera.x, wy = sy + camera.y;
    handlePitchClick(wx, wy);
  };
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseWorldX = (e.clientX - rect.left) * (CW / rect.width) + camera.x;
    mouseWorldY = (e.clientY - rect.top) * (CH / rect.height) + camera.y;
  };

  // Set scoreboard
  const homeMeta = TEAM_META[homeTeamName];
  const awayMeta = TEAM_META[awayTeamName];
  $('sbHomeName').textContent = homeTeamName;
  $('sbAwayName').textContent = awayTeamName;
  $('sbHomeFlag').src = `assets/teams/${homeMeta.slug}/flag.svg`;
  $('sbHomeFlag').onerror = function() { this.src = `https://flagcdn.com/${homeMeta.flagcdn}.svg`; };
  $('sbAwayFlag').src = `assets/teams/${awayMeta.slug}/flag.svg`;
  $('sbAwayFlag').onerror = function() { this.src = `https://flagcdn.com/${awayMeta.flagcdn}.svg`; };

  // Load data
  homeData = await loadTeamData(homeTeamName);
  awayData = await loadTeamData(awayTeamName);

  // Create players
  homePlayers = createPlayers(homeData, homeTeamName, 0);
  awayPlayers = createPlayers(awayData, awayTeamName, 1);
  buildAllPlayers();

  // Build sprite caches (uses player img objects loaded in createPlayers)
  const homeImgs = {}; homePlayers.forEach(p => { homeImgs[p.number] = p.img; });
  const awayImgs = {}; awayPlayers.forEach(p => { awayImgs[p.number] = p.img; });
  buildSpriteCache(TEAM_META[homeTeamName]?.slug || '', homePlayers, homeImgs);
  buildSpriteCache(TEAM_META[awayTeamName]?.slug || '', awayPlayers, awayImgs);

  // Rebuild sprite cache after 2s to catch late-loading images
  setTimeout(() => {
    const homeImgs2 = {}; homePlayers.forEach(p => { homeImgs2[p.number] = p.img; });
    const awayImgs2 = {}; awayPlayers.forEach(p => { awayImgs2[p.number] = p.img; });
    buildSpriteCache(TEAM_META[homeTeamName]?.slug || '', homePlayers, homeImgs2);
    buildSpriteCache(TEAM_META[awayTeamName]?.slug || '', awayPlayers, awayImgs2);
  }, 2500);

  // Reset state
  homeScore = 0; awayScore = 0;
  matchClock = 0; realTick = 0;
  halfSwapped = false;
  goalScorers = [];
  comedyStats = { dives: 0, varReviews: 0, fights: 0, redCards: 0, pitchInvaders: 0, selfies: 0 };
  events = [];
  ball = { x: WORLD_W / 2, y: WORLD_H / 2, vx: 0, vy: 0, owner: null, free: true };
  varActive = false;
  pitchInvader = null;
  lastComedyTime = 0;
  lastCommentaryTime = 0;
  activeEffects.length = 0;
  playerEventCounts.clear();
  specialEventsFired = {home: false, away: false};
  specialEventActive = false;
  specialSlowMo = 1;
  $('commentary').innerHTML = '';

  // Snap camera to center for kickoff
  snapCamera(WORLD_W / 2, WORLD_H / 2);

  updateScoreboard();

  // Start game loop in 'lineup' state so players render during ceremony
  gameState = 'lineup';
  if (animId) cancelAnimationFrame(animId);
  gameLoop();

  // Show pre-match banter overlay, then kick off
  showPrematch(homeTeamName, awayTeamName, function actualKickoff() {
    const homeNick = TEAM_NICKNAMES[homeTeamName] || homeTeamName;
    const awayNick = TEAM_NICKNAMES[awayTeamName] || awayTeamName;
    AudioManager.playWhistle(false);
    AudioManager.setCrowd(0.2);
    const koVars = {
      home: homeTeamName, away: awayTeamName,
      home_nick: homeNick, away_nick: awayNick,
      home_anecdote: getTeamAnecdote(homeTeamName),
    };
    addCommentary('info', pickComment('kick_off', koVars));

    const striker = homePlayers.find(p => p.position === 'FW' && !p.sentOff);
    if (striker) {
      striker.x = WORLD_W / 2 + 5;
      striker.y = WORLD_H / 2 + 5;
      ball.owner = striker;
      ball.free = false;
    }

    gameState = 'playing';

    if (animId) cancelAnimationFrame(animId);
    gameLoop();
  });
}

// ---- PRE-MATCH BANTER ----
// ---- Inline MIDI Parser ----
function parseMidi(buf) {
  const d = new Uint8Array(buf); let p = 0; const len = d.length;
  const u32=()=>{if(p+4>len)return 0;return(d[p++]<<24)|(d[p++]<<16)|(d[p++]<<8)|d[p++];};
  const u16=()=>{if(p+2>len)return 0;return(d[p++]<<8)|d[p++];};
  const vlq=()=>{let v=0,b,i=0;do{if(p>=len)return v;b=d[p++];v=(v<<7)|(b&0x7f);if(++i>4)break;}while(b&0x80);return v;};
  p=8; const fmt=u16(),trks=u16(),div=u16()||96; const notes=[]; let tempo=500000; // default 120 BPM in microseconds per quarter note
  for(let t=0;t<trks&&p<len;t++){
    if(p+8>len)break;
    p+=4; const tl=u32(); const end=Math.min(p+tl,len); let tk=0,ls=0; const on={};
    while(p<end-1){
      tk+=vlq(); if(p>=end)break;
      let st=d[p]; if(st<0x80){st=ls;}else{p++;ls=st;}
      if(p>=end)break;
      const tp=st&0xF0;
      if(tp===0x90){if(p+2>end){p=end;break;}const n=d[p++],v=d[p++];if(v>0){on[n]={t:tk,v};}else if(on[n]){notes.push({t:on[n].t/div,n,v:on[n].v,dur:(tk-on[n].t)/div});delete on[n];}}
      else if(tp===0x80){if(p+2>end){p=end;break;}const n=d[p++];p++;if(on[n]){notes.push({t:on[n].t/div,n,v:on[n].v,dur:(tk-on[n].t)/div});delete on[n];}}
      else if(tp===0xC0||tp===0xD0){p++;}
      else if(tp===0xFF){
        if(p>=end)break;
        const metaType=d[p++]; const l=vlq();
        // Extract tempo meta event (0x51 = Set Tempo, 3 bytes: microseconds per quarter note)
        if(metaType===0x51 && l===3 && p+3<=end){
          tempo=(d[p]<<16)|(d[p+1]<<8)|d[p+2];
          console.log('[MIDI] Tempo meta event:', tempo, 'us/qn =', Math.round(60000000/tempo), 'BPM');
        }
        p=Math.min(p+l,end);
      }
      else if(tp===0xF0||tp===0xF7){const l=vlq();p=Math.min(p+l,end);}
      else{p+=2;}
    }
    p=end; // ensure we advance to next track even if parsing was incomplete
    for(const n in on)notes.push({t:on[n].t/div,n:+n,v:on[n].v,dur:0.1});
  }
  const bpm = Math.round(60000000 / tempo);
  console.log('[MIDI] Final tempo:', bpm, 'BPM,', notes.length, 'notes');
  return {div, notes:notes.sort((a,b)=>a.t-b.t), bpm};
}

function scheduleMidi(midiData, maxSec=10) {
  const ac = AudioManager.ctx;
  if (!ac || AudioManager.muted) return;
  // Use parsed BPM from MIDI file, fallback to 120
  const bpm = midiData.bpm || 120;
  const bps = bpm / 60;
  console.log('[MIDI] Scheduling at', bpm, 'BPM,', midiData.notes.length, 'notes, maxSec=', maxSec);
  const mg = ac.createGain(); mg.gain.value = 0.6; mg.connect(ac.destination);
  let scheduled = 0;
  for (const n of midiData.notes) {
    const s = n.t / bps; if (s > maxSec) break;
    const dur = Math.max(0.05, Math.min(n.dur / bps, 2.0));
    const freq = 440 * Math.pow(2, (n.n - 69) / 12);
    // Skip inaudible frequencies (below 50Hz or above 8kHz)
    if (freq < 50 || freq > 8000) continue;
    const osc = ac.createOscillator(), g = ac.createGain();
    // Use triangle wave for warmer, more audible anthem sound
    osc.type = freq < 200 ? 'sawtooth' : 'triangle';
    osc.frequency.value = freq;
    const vol = (n.v / 127) * 0.55;
    g.gain.setValueAtTime(vol, ac.currentTime + s);
    // Gentle decay envelope for smoother sound
    g.gain.setValueAtTime(vol, ac.currentTime + s + dur * 0.7);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + s + dur);
    osc.connect(g); g.connect(mg);
    osc.start(ac.currentTime + s); osc.stop(ac.currentTime + s + dur + 0.05);
    scheduled++;
  }
  console.log('[MIDI] Scheduled', scheduled, 'oscillators');
}

async function playAnthemMidi(slug, maxSec=10) {
  console.log('[MIDI] playAnthemMidi called, slug=', slug, 'audioCtx=', AudioManager.ctx?.state);
  if (!AudioManager.ctx) { console.warn('[MIDI] No AudioContext!'); return 2000; }
  if (AudioManager.muted) { console.log('[MIDI] Muted, skipping'); return 2000; }
  try {
    const url = `assets/teams/${slug}/anthem.mid`;
    console.log('[MIDI] Fetching:', url);
    const resp = await fetch(url);
    if (!resp.ok) { console.warn('[MIDI] Fetch failed:', resp.status, url); return 2000; }
    const buf = await resp.arrayBuffer();
    console.log('[MIDI] Loaded', buf.byteLength, 'bytes, parsing...');
    const midi = parseMidi(buf);
    console.log('[MIDI] Parsed', midi.notes.length, 'notes, scheduling...');
    scheduleMidi(midi, maxSec);
    return maxSec * 1000;
  } catch(e) { console.error('[MIDI] Error:', e); return 2000; }
}

async function showPrematch(homeName, awayName, onComplete) {
  const overlay = $('prematchOverlay');
  const homeSlug = TEAM_META[homeName]?.slug || '';
  const awaySlug = TEAM_META[awayName]?.slug || '';

  // Walk players out to lineup positions at halfway line
  homePlayers.forEach((p,i) => {
    p.x = PITCH_L + PW*(0.15 + (i%11)*0.068);
    p.y = WORLD_H/2 + 45 + Math.floor(i/6)*35;
  });
  awayPlayers.forEach((p,i) => {
    p.x = PITCH_L + PW*(0.15 + (i%11)*0.068);
    p.y = WORLD_H/2 - 45 - Math.floor(i/6)*35;
  });
  snapCamera(WORLD_W/2, WORLD_H/2);

  // Build anthem name display
  const homeAnthemName = (typeof ANTHEM_TRANSLATIONS !== 'undefined' && ANTHEM_TRANSLATIONS[homeName]) ? ANTHEM_TRANSLATIONS[homeName][0] : '';
  const awayAnthemName = (typeof ANTHEM_TRANSLATIONS !== 'undefined' && ANTHEM_TRANSLATIONS[awayName]) ? ANTHEM_TRANSLATIONS[awayName][0] : '';

  // Home anthem
  $('pmHomeName').textContent = homeName + (TEAM_NICKNAMES[homeName] ? ` — ${TEAM_NICKNAMES[homeName]}` : '');
  $('pmAwayName').textContent = '';
  $('pmHomeAnecdote').textContent = homeAnthemName ? `♪ ${homeAnthemName} ♪` : '♪ National Anthem ♪';
  $('pmAwayAnecdote').textContent = '';
  $('pmTimer').textContent = '10';
  overlay.style.display = 'flex';

  // Add skip button to overlay
  let skipCeremony = false;
  const skipBtn = document.createElement('button');
  skipBtn.textContent = 'Skip ▶';
  skipBtn.style.cssText = 'font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;background:none;border:1px solid var(--line);color:var(--chalk-faint);border-radius:999px;padding:5px 16px;margin-top:20px;cursor:pointer;';
  skipBtn.onclick = () => { skipCeremony = true; };
  overlay.appendChild(skipBtn);

  const waitMs = (ms) => new Promise(r => {
    const start = Date.now();
    const check = setInterval(() => {
      if (skipCeremony || Date.now() - start >= ms) { clearInterval(check); r(); }
    }, 100);
  });

  // Home anthem
  let t=10;
  const homeTimer = setInterval(()=>{ t--; if ($('pmTimer')) $('pmTimer').textContent=Math.max(0,t); if(t<=0)clearInterval(homeTimer); }, 1000);
  const homeDur = await playAnthemMidi(homeSlug, 10).catch(()=>2000);
  await waitMs(homeDur);
  clearInterval(homeTimer);
  if (skipCeremony) { overlay.removeChild(skipBtn); overlay.style.display='none'; onComplete(); return; }

  // Away anthem
  $('pmHomeName').textContent = '';
  $('pmAwayName').textContent = awayName + (TEAM_NICKNAMES[awayName] ? ` — ${TEAM_NICKNAMES[awayName]}` : '');
  $('pmHomeAnecdote').textContent = '';
  $('pmAwayAnecdote').textContent = awayAnthemName ? `♪ ${awayAnthemName} ♪` : '♪ National Anthem ♪';
  $('pmTimer').textContent = '10';

  let t2=10;
  const awayTimer = setInterval(()=>{ t2--; if ($('pmTimer')) $('pmTimer').textContent=Math.max(0,t2); if(t2<=0)clearInterval(awayTimer); }, 1000);
  const awayDur = await playAnthemMidi(awaySlug, 10).catch(()=>2000);
  await waitMs(awayDur);
  clearInterval(awayTimer);

  // Brief anecdote pause
  $('pmHomeName').textContent = homeName;
  $('pmAwayName').textContent = awayName;
  $('pmHomeAnecdote').textContent = getTeamAnecdote(homeName);
  $('pmAwayAnecdote').textContent = getTeamAnecdote(awayName);
  $('pmTimer').textContent = '3';
  await waitMs(3000);

  overlay.removeChild(skipBtn);
  overlay.style.display = 'none';
  onComplete();
}

// ---- INIT ----
populateSelects();
parseURLParams();

$('homeSelect').addEventListener('change', () => updateSelectUI('home'));
$('awaySelect').addEventListener('change', () => updateSelectUI('away'));
$('kickoffBtn').addEventListener('click', startMatch);
$('rematchBtn').addEventListener('click', rematch);

$('startOverlay').addEventListener('click', function() {
  AudioManager.init();
  this.style.display = 'none';
  $('muteBtn').style.display = 'flex';
  // Show team select if not already pre-selected via URL params
  const hs = $('homeSelect').value, as = $('awaySelect').value;
  if (hs && as && hs !== as) {
    startMatch();
  } else {
    // Show the team select screen
    $('teamSelect').classList.remove('hidden');
  }
});

$('muteBtn').addEventListener('click', function() {
  AudioManager.muted = !AudioManager.muted;
  this.textContent = AudioManager.muted ? '\u{1F507}' : '\u{1F50A}';
  if (AudioManager.crowdGain) AudioManager.crowdGain.gain.value = AudioManager.muted ? 0 : 0.04;
});

$('crtBtn').addEventListener('click', () => {
  $('crtOverlay').classList.toggle('on');
});

function narrativeStat(value, templates) {
  if (!value) return '';
  const t = templates[Math.min(value - 1, templates.length - 1)];
  return `<div class="rs-stat">${t.replace('{n}', value)}</div>`;
