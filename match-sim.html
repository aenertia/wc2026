// ---- DATA LOADING ----
async function loadTeamData(teamName) {
  const meta = TEAM_META[teamName];
  if (!meta) return { roster: null, country: null, slug: meta?.slug };
  const slug = meta.slug;
  let roster = null, country = null;
  try {
    const r = await fetch(`assets/teams/${slug}/roster.json`);
    if (r.ok) roster = await r.json();
  } catch(e) {}
  try {
    const r = await fetch(`assets/teams/${slug}/country.json`);
    if (r.ok) country = await r.json();
  } catch(e) {}
  return { roster, country, slug, meta };
}

function inferFormation(roster) {
  const players = roster?.players || roster || [];
  if (!players.length) return { formation: '4-3-3', starters: [], subs: [] };
  const sorted = [...players].sort((a, b) => {
    if (a.captain && !b.captain) return -1;
    if (!a.captain && b.captain) return 1;
    return (b.caps || 0) - (a.caps || 0);
  });
  const counts = { GK: 0, DF: 0, MF: 0, FW: 0 };
  players.forEach(p => { if (counts[p.position] !== undefined) counts[p.position]++; });
  const totalOutfield = counts.DF + counts.MF + counts.FW;
  const dfRatio = counts.DF / totalOutfield;
  const fwRatio = counts.FW / totalOutfield;
  const mfRatio = counts.MF / totalOutfield;
  let formation, dfCount, mfCount, fwCount;
  if (dfRatio >= 0.38 && fwRatio <= 0.22) {
    if (counts.DF >= 7) { formation="5-3-2"; dfCount=5; mfCount=3; fwCount=2; }
    else { formation="4-4-2"; dfCount=4; mfCount=4; fwCount=2; }
  } else if (mfRatio >= 0.40 && fwRatio <= 0.25) {
    if (counts.DF <= 7) { formation="3-5-2"; dfCount=3; mfCount=5; fwCount=2; }
    else { formation="4-2-3-1"; dfCount=4; mfCount=5; fwCount=1; }
  } else if (fwRatio >= 0.28) {
    if (counts.DF <= 7) { formation="3-4-3"; dfCount=3; mfCount=4; fwCount=3; }
    else { formation="4-3-3"; dfCount=4; mfCount=3; fwCount=3; }
  } else {
    formation="4-3-3"; dfCount=4; mfCount=3; fwCount=3;
  }
  const targets = { GK: 1, DF: dfCount, MF: mfCount, FW: fwCount };
  const starters = [], subs = [];
  const posStarters = { GK: 0, DF: 0, MF: 0, FW: 0 };
  for (const player of sorted) {
    const pos = player.position;
    if (posStarters[pos] < (targets[pos] || 0)) { starters.push(player); posStarters[pos]++; }
    else subs.push(player);
  }
  for (const player of sorted) {
    if (starters.length >= 11) break;
    if (!starters.includes(player)) { starters.push(player); const idx = subs.indexOf(player); if (idx > -1) subs.splice(idx, 1); }
  }
  const posOrder = { GK: 0, DF: 1, MF: 2, FW: 3 };
  starters.sort((a, b) => (posOrder[a.position] || 2) - (posOrder[b.position] || 2));
  return { formation, starters: starters.slice(0, 11), subs };
}

function lastName(name) {
  if (!name) return '???';
  const parts = name.split(' ');
  return parts[parts.length - 1];
}

// ---- PLAYER SPRITE CREATION ----
function createPlayers(teamData, teamName, side) {
  // side: 0=home (attacks up/top), 1=away (attacks down/bottom)
  const form = inferFormation(teamData?.roster);
  const coords = FORMATION_POSITIONS[form.formation] || FORMATION_POSITIONS["4-3-3"];
  const colors = TEAM_COLORS[teamName] || ['#fff', '#888'];
  const slug = TEAM_META[teamName]?.slug || '';
  const players = [];

  for (let i = 0; i < 11; i++) {
    const pd = form.starters[i] || { number: i + 1, position: i === 0 ? 'GK' : 'FW', name: `Player ${i+1}`, captain: false };
    // Formation coords: x=0-100 (left-right), y=0-100 (top=attacking end, bottom=own goal)
    let fx = coords[i] ? coords[i][0] : 50;
    let fy = coords[i] ? coords[i][1] : 50;

    // Convert percentage to pitch pixels
    // side 0 (home): attacks toward PITCH_T (top), own goal at PITCH_B (bottom)
    //   so y=92 (GK near own goal) maps to near PITCH_B, y=18 (striker) maps to near PITCH_T
    // side 1 (away): mirror — attacks toward PITCH_B, own goal at PITCH_T
    let px, py;
    if (side === 0) {
      px = PITCH_L + (fx / 100) * PW;
      py = PITCH_T + (fy / 100) * PH;
    } else {
      px = PITCH_L + ((100 - fx) / 100) * PW;
      py = PITCH_T + ((100 - fy) / 100) * PH;
    }

    const img = new Image();
    img.src = `assets/teams/${slug}/players/${pd.number}.png`;
    let imgLoaded = false;
    img.onload = () => { imgLoaded = true; };
    img.onerror = () => { imgLoaded = false; };

    players.push({
      x: px, y: py,
      homeX: px, homeY: py,
      vx: 0, vy: 0,
      number: pd.number,
      name: pd.name,
      lastName: lastName(pd.name),
      position: pd.position,
      captain: pd.captain || false,
      team: side,
      teamName: teamName,
      slug: slug,
      awayColor: side === 1 ? (colors[0] || '#e05cd9') : null,
      shirtColor: side === 0 ? colors[0] : colors[1],
      shortsColor: side === 0 ? colors[1] : colors[0],
      img, imgLoaded: () => imgLoaded,
      state: 'idle', // idle | chasing | hasBall | celebrating | fighting | diving | sentOff
      caps: pd.caps || 0,
      speed: pd.position === 'GK' ? GK_SPEED : playerSpeed(pd.caps || 0),
      stateTimer: 0,
      goals: 0,
      sentOff: false,
      diveAngle: 0,
      slideX: 0, slideY: 0,
    });
  }
  return players;
}

// Offscreen canvas sprite cache — pre-renders circular mugshot clips for performance
const playerSpriteCache = new Map(); // key: "slug/number", value: OffscreenCanvas or HTMLCanvasElement

function buildSpriteCache(slug, players, images) {
  for (const player of players) {
    const key = `${slug}/${player.number}`;
    const size = 40; // head diameter (matches hr=20 in drawPlayer)
    // Use OffscreenCanvas if available, fallback to createElement
    const oc = typeof OffscreenCanvas !== 'undefined'
      ? new OffscreenCanvas(size, size)
      : Object.assign(document.createElement('canvas'), {width: size, height: size});
    const octx = oc.getContext('2d');
    octx.beginPath();
    octx.arc(size/2, size/2, size/2, 0, Math.PI*2);
    octx.clip();
    const img = images[player.number];
    if (img && img.complete && img.naturalWidth > 0) {
      octx.drawImage(img, 0, 0, size, size);
    } else {
      // Fallback: coloured circle with number
      octx.fillStyle = player.teamColor || '#888';
      octx.fill();
      octx.fillStyle = '#fff';
      octx.font = `bold ${Math.floor(size*0.4)}px monospace`;
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';
      octx.fillText(String(player.number), size/2, size/2);
    }
    playerSpriteCache.set(key, oc);
  }
}

// ---- PITCH DRAWING ----
function drawPitch(ctx) {
  const px = PITCH_L, py = PITCH_T, pw = PW, ph = PH;
  const m = PITCH_M; // pixels per metre

  // --- Background (beyond touchlines) ---
  ctx.fillStyle = '#1e5c32';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // --- Mowing stripes (horizontal bands, Sensible Soccer style) ---
  const stripeCount = 18;
  const stripeH = ph / stripeCount;
  const greens = ['#2a7a42', '#2d8c4e', '#31985a'];
  for (let i = 0; i < stripeCount; i++) {
    ctx.fillStyle = greens[i % 2 === 0 ? 0 : (i % 4 === 1 ? 1 : 2)];
    ctx.fillRect(px, py + i * stripeH, pw, stripeH + 1); // +1 prevents sub-pixel gaps
  }

  // Subtle vignette edges (darker border strips)
  ctx.fillStyle = '#1e5c32';
  ctx.fillRect(px, py, pw, 4);
  ctx.fillRect(px, py + ph - 4, pw, 4);
  ctx.fillRect(px, py, 4, ph);
  ctx.fillRect(px + pw - 4, py, 4, ph);

  // --- Pitch outline (touchlines) ---
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeRect(px, py, pw, ph);

  // --- Halfway line ---
  const midY = py + ph / 2;
  ctx.beginPath();
  ctx.moveTo(px, midY);
  ctx.lineTo(px + pw, midY);
  ctx.stroke();

  // --- Center circle ---
  ctx.beginPath();
  ctx.arc(px + pw / 2, midY, 100, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();

  // --- Center spot ---
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(px + pw / 2, midY, 4, 0, Math.PI * 2);
  ctx.fill();

  // --- Penalty boxes (16.5m deep × 40.32m wide) ---
  const pbW = 40.32 * m;
  const pbH = 16.5 * m;
  const pbX = px + (pw - pbW) / 2;
  ctx.strokeRect(pbX, py, pbW, pbH);
  ctx.strokeRect(pbX, py + ph - pbH, pbW, pbH);

  // --- 6-yard boxes (5.5m deep × 18.32m wide) ---
  const gbW = 18.32 * m;
  const gbH = 5.5 * m;
  const gbX = px + (pw - gbW) / 2;
  ctx.strokeRect(gbX, py, gbW, gbH);
  ctx.strokeRect(gbX, py + ph - gbH, gbW, gbH);

  // --- Penalty spots (11m from goal line) ---
  const pspY = 11 * m;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(px + pw / 2, py + pspY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + pw / 2, py + ph - pspY, 4, 0, Math.PI * 2); ctx.fill();

  // --- Penalty arcs (D) ---
  // Arc outside the penalty box, centred on penalty spot, radius = 9.15m
  const arcR = 9.15 * m;
  // Top penalty arc: arc below the penalty box top edge
  ctx.beginPath();
  ctx.arc(px + pw / 2, py + pspY, arcR, 0.6, Math.PI - 0.6);
  ctx.stroke();
  // Bottom penalty arc: arc above the penalty box bottom edge
  ctx.beginPath();
  ctx.arc(px + pw / 2, py + ph - pspY, arcR, Math.PI + 0.6, -0.6);
  ctx.stroke();

  // --- Corner arcs (1m radius) ---
  const cr = 1 * m;
  ctx.beginPath(); ctx.arc(px, py, cr, 0, Math.PI / 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px + pw, py, cr, Math.PI / 2, Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(px, py + ph, cr, -Math.PI / 2, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(px + pw, py + ph, cr, Math.PI, Math.PI * 1.5); ctx.stroke();

  // --- Goals ---
  const goalW = GOAL_W;
  const goalD = GOAL_H;
  const goalX = GOAL_L;

  // Top goal (home attacks here → away's goal)
  ctx.fillStyle = '#1a3a28';
  ctx.fillRect(goalX, GOAL_TOP_Y, goalW, goalD);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(goalX, GOAL_TOP_Y, goalW, goalD);

  // Bottom goal (away attacks here → home's goal)
  ctx.fillStyle = '#1a3a28';
  ctx.fillRect(goalX, GOAL_BOT_Y, goalW, goalD);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(goalX, GOAL_BOT_Y, goalW, goalD);

  // Netting: crosshatch pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.5;
  const netSpacing = goalD / 3;
  // Horizontal net lines
  for (let n = 0; n < 3; n++) {
    const hy = n * netSpacing;
    ctx.beginPath(); ctx.moveTo(goalX, GOAL_TOP_Y + hy); ctx.lineTo(goalX + goalW, GOAL_TOP_Y + hy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(goalX, GOAL_BOT_Y + hy); ctx.lineTo(goalX + goalW, GOAL_BOT_Y + hy); ctx.stroke();
  }
  // Vertical net lines
  const vNetCount = Math.floor(goalW / netSpacing);
  for (let v = 0; v <= vNetCount; v++) {
    const nx = goalX + v * netSpacing;
    ctx.beginPath(); ctx.moveTo(nx, GOAL_TOP_Y); ctx.lineTo(nx, PITCH_T); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(nx, GOAL_BOT_Y); ctx.lineTo(nx, GOAL_BOT_Y + goalD); ctx.stroke();
  }

  // Reset line style
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
}

// ---- DRAW PLAYER (Sensible Soccer style: oversized head on tiny body) ----
function drawPlayer(ctx, p) {
  if (p.sentOff) return;

  const x = p.x + (p.slideX || 0);
  const y = p.y + (p.slideY || 0);
  const isMoving = Math.abs(p.vx) > 0.3 || Math.abs(p.vy) > 0.3;
  const frame = Math.floor(Date.now() / 120) % 2; // 2-frame walk cycle ~8fps
  const hasBall = ball.owner === p;

  // --- Shadow ---
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x, y + 3, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Body (tiny rectangle) ---
  // Kit colours: GK gets team-specific bright colour, outfield uses TEAM_COLORS
  let shirtCol, shortsCol;
  if (p.position === 'GK') {
    shirtCol = p.team === 0 ? '#ccdd22' : '#ff7700';
    shortsCol = p.team === 0 ? '#889900' : '#bb4400';
  } else if (p.team === 0) {
    const cols = (typeof TEAM_COLORS !== 'undefined' && p.teamName && TEAM_COLORS[p.teamName]) ? TEAM_COLORS[p.teamName] : ['#f2f4ec','#1a3a6a'];
    shirtCol = cols[0] || '#f2f4ec';
    shortsCol = cols[1] || '#1a3a6a';
  } else {
    const cols = (typeof TEAM_COLORS !== 'undefined' && p.teamName && TEAM_COLORS[p.teamName]) ? TEAM_COLORS[p.teamName] : ['#e05cd9','#330033'];
    shirtCol = cols[1] || '#e05cd9';
    shortsCol = cols[0] || '#220022';
  }
  const kitColor = shirtCol; // keep kitColor for backwards compat
  const bw = 6, bh = 8;
  const legShift = isMoving ? (frame === 0 ? 1 : -1) : 0;
  ctx.fillStyle = shirtCol;
  ctx.fillRect(x - bw / 2, y - bh / 2 + legShift, bw, bh);

  // --- Shorts: darker lower half of body ---
  ctx.fillStyle = shortsCol;
  ctx.fillRect(x - bw / 2, y, bw, bh / 2 + legShift);

  // --- Socks: 2px stripe at bottom ---
  ctx.fillStyle = shirtCol;
  ctx.fillRect(x - bw / 2, y + bh / 2 - 1, bw, 2);

  // --- Captain armband: gold stripe ---
  if (p.captain) {
    ctx.fillStyle = '#f0c44c';
    ctx.fillRect(x + bw / 2 - 2, y - bh / 2 + 1, 2, 3);
  }

  // --- Head: circular mugshot (comically oversized) ---
  const hr = PLAYER_HEAD_R; // head radius — 40px diameter, comically oversized
  const headY = y - bh / 2 - hr + 1; // sits just above body
  const cacheKey = `${p.slug}/${p.number}`;
  const cachedHead = playerSpriteCache.get(cacheKey);

  if (cachedHead) {
    ctx.drawImage(cachedHead, x - hr, headY - hr, hr * 2, hr * 2);
  } else {
    // Fallback: coloured circle with number
    ctx.fillStyle = kitColor;
    ctx.beginPath();
    ctx.arc(x, headY, hr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(p.number), x, headY);
  }

  // Head outline ring (team primary colour, thicker for visibility at 40px)
  ctx.strokeStyle = shirtCol;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, headY, hr, 0, Math.PI * 2);
  ctx.stroke();
  // Dark definition ring
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, headY, hr + 1, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1;

  // --- Facing indicator: tiny triangle below body ---
  if (isMoving) {
    const angle = Math.atan2(p.vy, p.vx);
    const tSize = 3;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.save();
    ctx.translate(x, y + bh / 2 + 3);
    ctx.rotate(angle - Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, -tSize);
    ctx.lineTo(-tSize / 2, tSize / 2);
    ctx.lineTo(tSize / 2, tSize / 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // --- Name label (initial letter of surname only) ---
  const initial = (p.lastName || p.name || '?').charAt(0).toUpperCase();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '7px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(initial, x, y + bh / 2 + 7);

  // --- Ball at feet ---
  if (hasBall) {
    const dir = Math.atan2(p.vy || 1, p.vx || 0);
    const bfx = x + Math.cos(dir) * 10;
    const bfy = y + Math.sin(dir) * 10;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bfx, bfy, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Diving effect ---
  if (p.state === 'diving') {
    const t = p.stateTimer;
    for (let s = 0; s < 3; s++) {
      const sAngle = (t * 0.1 + s * 2.1);
      const sx = x + Math.cos(sAngle) * 16;
      const sy = headY + Math.sin(sAngle) * 12 - 8;
      ctx.fillStyle = '#f0c44c';
      ctx.font = '10px serif';
      ctx.textAlign = 'center';
      ctx.fillText('\u2605', sx, sy);
    }
  }

  // --- Fighting effect ---
  if (p.state === 'fighting') {
    const t = p.stateTimer;
    ctx.font = '12px serif';
    ctx.textAlign = 'center';
    ctx.fillText(['\u{1F4A5}', '\u{1F44A}', '\u{1F92C}'][Math.floor(t / 10) % 3], x + 10, headY - 8);
  }
}

// ---- DRAW BALL ----
function drawReferee(ctx) {
  // Track ball, offset to side; during fight: sprint to cluster
  ref.targetX = ref.inFight ? ref.fightX : ball.x + 75;
  ref.targetY = ref.inFight ? ref.fightY : ball.y - 25;
  ref.x += (ref.targetX - ref.x) * (ref.inFight ? 0.18 : 0.03);
  ref.y += (ref.targetY - ref.y) * (ref.inFight ? 0.18 : 0.03);
  ref.x = Math.max(PITCH_L+5, Math.min(PITCH_R-5, ref.x));
  ref.y = Math.max(PITCH_T+5, Math.min(PITCH_B-5, ref.y));
  const rx = ref.x, ry = ref.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(rx, ry+3, 6, 2.5, 0, 0, Math.PI*2); ctx.fill();
  // Black body with yellow stripe
  ctx.fillStyle = '#111827';
  ctx.fillRect(rx-3, ry-4, 6, 9);
  ctx.fillStyle = '#f0c44c';
  ctx.fillRect(rx-3, ry+1, 6, 2);
  // Head
  ctx.fillStyle = '#ddb896';
  ctx.beginPath(); ctx.arc(rx, ry-7, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 0.5; ctx.stroke(); ctx.lineWidth = 1;
  // Show yellow card during fight
  if (ref.inFight && Math.random() < 0.08) {
    ctx.fillStyle = '#f0c44c';
    ctx.fillRect(rx+5, ry-12, 6, 8);
  }
}

function drawBall(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 2, BALL_R + 1, BALL_R - 1, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ---- DRAW VAR OVERLAY ----
function drawVAR(ctx) {
  if (!varActive) return;
  // Dotted rectangle
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#b06cf2';
  ctx.lineWidth = 2;
  ctx.strokeRect(CW / 2 - 100, CH / 2 - 60, 200, 120);
  ctx.setLineDash([]);

  // Text
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(CW / 2 - 100, CH / 2 - 60, 200, 120);

  ctx.fillStyle = '#b06cf2';
  ctx.font = "bold 18px 'Anton', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (varTimer > 90) {
    ctx.fillText('VAR REVIEWING...', CW / 2, CH / 2 - 10);
    ctx.font = "14px 'Space Mono', monospace";
    ctx.fillStyle = '#fff';
    ctx.fillText('🖥️ checking the monitor', CW / 2, CH / 2 + 16);
  } else {
    ctx.fillStyle = varResult === 'PENALTY!' ? '#f25c5c' : '#4dc97b';
    ctx.fillText(varResult, CW / 2, CH / 2);
  }
}

// ---- DRAW PITCH INVADER ----
function drawPitchInvader(ctx) {
  if (!pitchInvader) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath();
  ctx.arc(pitchInvader.x, pitchInvader.y - 6, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(pitchInvader.x - 3, pitchInvader.y, 6, 10);
  // Steward chasing
  if (pitchInvader.steward) {
    ctx.fillStyle = '#f0c44c';
    ctx.beginPath();
    ctx.arc(pitchInvader.steward.x, pitchInvader.steward.y - 6, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(pitchInvader.steward.x - 3, pitchInvader.steward.y, 6, 10);
  }
}

// ---- BALL PHYSICS ----
function updateBall() {
  if (ball.owner) {
    // Ball follows owner
    const p = ball.owner;
    const dir = p.team === 0 ? -1 : 1; // attacking direction
    ball.x = p.x;
    ball.y = p.y + dir * 12;
    ball.vx = 0;
    ball.vy = 0;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;

  // Clamp tiny velocities
  if (Math.abs(ball.vx) < 0.1) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.1) ball.vy = 0;

  // Side boundaries (throw-in)
  if (ball.x < PITCH_L || ball.x > PITCH_R) {
    ball.x = Math.max(PITCH_L + 5, Math.min(PITCH_R - 5, ball.x));
    ball.vx = 0; ball.vy = 0;
    ball.free = true;
    ball.owner = null;
  }

  // End boundaries — check for goal or corner/goal-kick
  if (ball.y < PITCH_T) {
    if (ball.x > GOAL_L && ball.x < GOAL_R) {
      scoreGoal(0); return;
    }
    // Missed — corner or goal kick
    const lastTeam = ball.lastTouchedBy?.team;
    // home attacks toward PITCH_T (team 0), so if away last touched → corner for home
    if (lastTeam === 1 && Date.now() - lastCornerTime > CORNER_COOLDOWN) {
      lastCornerTime = Date.now();
      triggerCornerKick(0, 'top', ball.x < WORLD_W/2 ? 'left' : 'right');
    } else {
      // Goal kick for team 1 (defending)
      ball.x = WORLD_W/2; ball.y = PITCH_T + 30;
      ball.vx = 0; ball.vy = 0; ball.free = true; ball.owner = null;
      addCommentary('default', `Goal kick — ${awayTeamName} to restart.`);
    }
    return;
  }

  if (ball.y > PITCH_B) {
    if (ball.x > GOAL_L && ball.x < GOAL_R) {
      scoreGoal(1); return;
    }
    // Missed — corner or goal kick
    const lastTeam = ball.lastTouchedBy?.team;
    // away attacks toward PITCH_B (team 1), so if home last touched → corner for away
    if (lastTeam === 0 && Date.now() - lastCornerTime > CORNER_COOLDOWN) {
      lastCornerTime = Date.now();
      triggerCornerKick(1, 'bottom', ball.x < WORLD_W/2 ? 'left' : 'right');
    } else {
      ball.x = WORLD_W/2; ball.y = PITCH_B - 30;
      ball.vx = 0; ball.vy = 0; ball.free = true; ball.owner = null;
      addCommentary('default', `Goal kick — ${homeTeamName} to restart.`);
    }
    return;
  }
}

// ---- GOAL ----
function scoreGoal(scoringTeam) {
  const scoringPlayers = scoringTeam === 0 ? homePlayers : awayPlayers;
  const teamName = scoringTeam === 0 ? homeTeamName : awayTeamName;

  // Find who was last to touch/shoot
  let scorer = null;
  // Simple heuristic: nearest player to the goal on scoring side
  const goalY = scoringTeam === 0 ? PITCH_T : PITCH_B;
  let minDist = Infinity;
  for (const p of scoringPlayers) {
    if (p.sentOff || p.position === 'GK') continue;
    const d = dist(p.x, p.y, ball.x, goalY);
    if (d < minDist) { minDist = d; scorer = p; }
  }
  if (!scorer) scorer = scoringPlayers.find(p => !p.sentOff && p.position !== 'GK') || scoringPlayers[0];

  if (scoringTeam === 0) homeScore++; else awayScore++;
  scorer.goals++;
  window.DEBUG_STATS.goals++;
  const minute = Math.floor(matchClock);
  goalScorers.push({ player: scorer, team: teamName, minute });

  AudioManager.playGoal();
  const scorerRoster = findPlayerInRoster(scorer.lastName, scoringTeam);
  const goalVars = {
    scorer: scorer.lastName,
    score: `${homeScore}–${awayScore}`,
    team_nick: TEAM_NICKNAMES[teamName] || teamName,
    scorer_fact: getPlayerFact(scorerRoster),
    team_anecdote: getTeamAnecdote(teamName),
  };
  addCommentary('goal', pickComment('goal', goalVars));

  // Country event hooks on goal/concede
  const concedingTeamName = scoringTeam === 0 ? awayTeamName : homeTeamName;
  const scoringHook = COUNTRY_EVENT_HOOKS?.[teamName];
  const concedingHook = COUNTRY_EVENT_HOOKS?.[concedingTeamName];
  if (scoringHook?.onGoal && Math.random() < 0.65)
    setTimeout(() => addCommentary('comedy', scoringHook.onGoal), 2200);
  if (concedingHook?.onConcede && Math.random() < 0.45)
    setTimeout(() => addCommentary('comedy', concedingHook.onConcede), 3500);

  // Bio hook follow-up for goal scorer
  if (scorer) {
    const rp = findPlayerInRoster(scorer.lastName, scoringTeam===0?homeTeamName:awayTeamName);
    if (rp?.bio) {
      const bioLine = matchBioHook(scorer.lastName, rp.bio, 'scores at the World Cup');
      if (bioLine) setTimeout(() => addCommentary('info', bioLine), 1800);
    }
  }

  // Celebration
  for (const p of scoringPlayers) {
    if (p.sentOff) continue;
    p.state = 'celebrating';
    p.stateTimer = 90;
  }

  // Comedy celebration events with visual effects
  if (Math.random() < 0.4) {
    const celebVars = { scorer: scorer.lastName };
    addCommentary('comedy', pickComment('goal_celebration', celebVars));
    // Selfie celebration: phone shape + dust from knee slide
    if (Math.random() < 0.5) {
      addEffect('phone', scorer.x, scorer.y);
    } else {
      addEffect('dust', scorer.x, scorer.y, {dir: 1});
      addEffect('dust', scorer.x, scorer.y, {dir: -1});
    }
    comedyStats.selfies++;
    trackPlayerEvent(scorer.name, 'selfies');
  }

  // Reset ball
  ball.x = WORLD_W / 2; ball.y = WORLD_H / 2;
  ball.vx = 0; ball.vy = 0;
  ball.owner = null; ball.free = true;

  // Snap camera toward goal mouth
  const goalCamY = scoringTeam === 0 ? PITCH_T + 100 : PITCH_B - 100;
  snapCamera(WORLD_W / 2, goalCamY);

  gameState = 'goalScored';
  pauseTimer = 120;

  updateScoreboard();
}

// ---- PLAYER AI ----
function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

function playerSpeed(caps) {
  // caps 0-200+ → speed 2.0-4.5 (world units per frame)
  return 2.0 + Math.min(caps, 120) / 120 * 2.5;
}

function getChaseRoles(players) {
  const outfield = players.filter(p => p.position !== 'GK' && !p.sentOff && p.state !== 'diving' && p.state !== 'fighting' && p.state !== 'celebrating');
  outfield.sort((a, b) => dist(a.x, a.y, ball.x, ball.y) - dist(b.x, b.y, ball.x, ball.y));
  return {
    chaser: outfield[0] || null,
    support: outfield[1] || null,
    holders: outfield.slice(2)
  };
}

function getShiftedHomePos(player, myTeamHasBall, isHomeTeam) {
  const hx = player.homeX, hy = player.homeY;
  const shiftFactor = 0.15;
  const ownGoalY = isHomeTeam ? PITCH_B : PITCH_T;
  const oppGoalY = isHomeTeam ? PITCH_T : PITCH_B;
  let sy = hy;
  if (myTeamHasBall) {
    sy += (oppGoalY - hy) * shiftFactor;
  } else {
    sy += (ownGoalY - hy) * shiftFactor;
  }
  // Widen x-spread by 30% for more use of pitch width
  const cx = WORLD_W / 2;
  const widenedX = cx + (hx - cx) * 1.3;
  const clampedX = Math.max(PITCH_L + 20, Math.min(PITCH_R - 20, widenedX));
  return { x: clampedX, y: sy };
}

function moveToward(p, tx, ty, speed) {
  const d = dist(p.x, p.y, tx, ty);
  if (d < 2) return;
  p.vx = ((tx - p.x) / d) * speed;
  p.vy = ((ty - p.y) / d) * speed;
}

function findNearestBallChaser(players) {
  let nearest = null, minD = Infinity;
  for (const p of players) {
    if (p.sentOff || p.state === 'diving' || p.state === 'fighting' || p.state === 'celebrating') continue;
    const d = dist(p.x, p.y, ball.x, ball.y);
    if (d < minD) { minD = d; nearest = p; }
  }
  return nearest;
}

function findTeammate(p, players) {
  let best = null, bestScore = -Infinity;
  const attackDir = p.team === 0 ? -1 : 1; // -1 = up, 1 = down
  for (const t of players) {
    if (t === p || t.sentOff || t.position === 'GK') continue;
    const ahead = (t.y - p.y) * attackDir;
    const lateral = Math.abs(t.x - p.x);
    const space = nearestOpponentDist(t);
    // Reward wide players — encourage lateral passes for wider play
    const isWide = Math.abs(t.x - WORLD_W / 2) > PW * 0.25;
    const wideBonus = isWide ? 35 : 0;
    const score = ahead * 0.5 + space * 0.3 - lateral * 0.05 + wideBonus;
    if (score > bestScore) { bestScore = score; best = t; }
  }
  return best;
}

function nearestOpponentDist(p) {
  const opponents = p.team === 0 ? awayPlayers : homePlayers;
  let minD = Infinity;
  for (const o of opponents) {
    if (o.sentOff) continue;
    const d = dist(p.x, p.y, o.x, o.y);
    if (d < minD) minD = d;
  }
  return minD;
}

function shootBall(p) {
  const goalX = WORLD_W / 2 + (Math.random() - 0.5) * GOAL_W * 0.7;
  const goalY = p.team === 0 ? PITCH_T - 5 : PITCH_B + 5;
  const d = dist(p.x, p.y, goalX, goalY);
  const accuracy = 0.85 + Math.random() * 0.3;
  // Add ±20° angle spread for wider shot variety
  const baseAngle = Math.atan2(goalY - p.y, goalX - p.x);
  const spread = (Math.random() - 0.5) * (Math.PI / 9);
  ball.vx = Math.cos(baseAngle + spread) * SHOOT_SPEED * accuracy;
  ball.vy = Math.sin(baseAngle + spread) * SHOOT_SPEED * accuracy;
  ball.lastTouchedBy = p;
  ball.owner = null;
  ball.free = true;
  p.state = 'idle';
  AudioManager.playKick();

  if (Math.random() < 0.4) {
    addCommentary('default', `${p.lastName} lets fly! ${Math.random() < 0.5 ? 'Powerful effort!' : 'What a strike!'}`);
  }
}

function passBall(p, target) {
  const d = dist(p.x, p.y, target.x, target.y);
  const inaccuracy = (Math.random() - 0.5) * 5; // wider inaccuracy for more lateral play
  ball.vx = ((target.x - p.x) / d) * PASS_SPEED + inaccuracy;
  ball.vy = ((target.y - p.y) / d) * PASS_SPEED + inaccuracy;
  ball.lastTouchedBy = p;
  ball.owner = null;
  ball.free = true;
  p.state = 'idle';
  AudioManager.playKick();
  window.DEBUG_STATS.passes++;

  if (Math.random() < 0.15) {
    addCommentary('default', `${p.lastName} finds ${target.lastName} with a lovely ball.`);
  }
}

function handlePitchClick(wx, wy) {
  if (gameState !== 'playing') return;
  const allP = [...homePlayers, ...awayPlayers];

  // Check if clicked on a specific player
  const clicked = allP.find(p => !p.sentOff && dist(p.x, p.y, wx, wy) < 22);
  if (clicked) {
    addEffect('player_highlight', clicked.x, clicked.y, {duration: 0.5});
    addCommentary('default', `${clicked.lastName} feels the crowd's energy!`);
    return;
  }

  // During fight: show fist emoji
  const fighting = allP.some(p => p.state === 'fighting');
  if (fighting) {
    addEffect('fist_click', wx, wy, {duration: 0.35});
    AudioManager.playComedy();
    allP.filter(p => p.state === 'fighting').forEach(p => p.stateTimer = Math.min(p.stateTimer + 30, 300));
    return;
  }

  // Direction hint: ball carrier biases toward click for 1 second
  if (ball.owner && ball.owner.team === 0) {
    clickTarget = {x: wx, y: wy, framesLeft: 60};
    addEffect('target_circle', wx, wy, {duration: 1.0});
  }
}

function triggerCornerKick(attackingTeam, goalEnd, side) {
  const cx = side === 'left' ? PITCH_L + 10 : PITCH_R - 10;
  const cy = goalEnd === 'top' ? PITCH_T + 10 : PITCH_B - 10;
  ball.x = cx; ball.y = cy; ball.vx = 0; ball.vy = 0;
  ball.owner = null; ball.free = true;
  const takers = (attackingTeam === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff);
  const taker = takers.sort((a,b)=>dist(a.x,a.y,cx,cy)-dist(b.x,b.y,cx,cy))[0];
  const tName = attackingTeam === 0 ? homeTeamName : awayTeamName;
  addCommentary('default', `Corner for ${tName}! ${taker?.lastName||''} to deliver...`);
  snapCamera(cx, cy);
  if (taker) {
    taker.x = cx; taker.y = cy + (goalEnd==='top'?15:-15);
    setTimeout(() => {
      if (!ball.free) return;
      const targetX = WORLD_W/2 + (Math.random()-0.5)*150;
      const targetY = goalEnd==='top' ? PITCH_T+PH*0.17 : PITCH_B-PH*0.17;
      const d = dist(cx, cy, targetX, targetY);
      ball.vx = ((targetX-cx)/d)*9;
      ball.vy = ((targetY-cy)/d)*9;
      ball.lastTouchedBy = taker;
      AudioManager.playKick();
    }, 800);
  }
}

function updatePlayerAI(p, teammates, opponents, roles) {
  // Walk-off animation for red-carded player
  if (p.state === 'walkingOff') {
    const dx = p.walkOffTargetX - p.x, dy = p.walkOffTargetY - p.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d > 8) { p.x += (dx/d)*3; p.y += (dy/d)*3; }
    else { p.sentOff = true; } // fully off pitch — stop drawing
    return;
  }
  if (p.sentOff) return;

  // Decrement state timers
  if (p.stateTimer > 0) {
    p.stateTimer--;
    if (p.state === 'diving') {
      p.slideX = Math.sin(p.stateTimer * 0.3) * 3;
      p.slideY = Math.cos(p.stateTimer * 0.3) * 2;
      if (p.stateTimer <= 0) { p.state = 'idle'; p.slideX = 0; p.slideY = 0; }
      return;
    }
    if (p.state === 'fighting') {
      if (p.stateTimer <= 0) p.state = 'idle';
      return;
    }
    if (p.state === 'celebrating') {
      if (p.stateTimer <= 0) p.state = 'idle';
      return;
    }
  }

  // Goalkeeper AI
  if (p.position === 'GK') {
    updateGK(p, opponents);
    return;
  }

  const isHomeTeam = p.team === 0;
  const myTeamHasBall = ball.owner && ball.owner.team === p.team;

  // Check if this player has the ball
  if (ball.owner === p) {
    p.state = 'hasBall';
    // Apply click direction bias if active
    if (clickTarget && clickTarget.framesLeft > 0 && p.team === 0) {
      const cdx = clickTarget.x - p.x, cdy = clickTarget.y - p.y;
      const cd = Math.sqrt(cdx*cdx+cdy*cdy)||1;
      p.x += (cdx/cd) * p.speed * 0.3;
      p.y += (cdy/cd) * p.speed * 0.3;
      clickTarget.framesLeft--;
    }
    const attackGoalY = isHomeTeam ? PITCH_T : PITCH_B;
    const distToGoal = dist(p.x, p.y, WORLD_W / 2, attackGoalY);

    // Shooting range
    if (distToGoal < 360 && Math.abs(p.x - WORLD_W / 2) < 280) {
      if (Math.random() < 0.03 + (360 - distToGoal) / 6000) {
        shootBall(p);
        return;
      }
    }

    // Pass to teammate ahead
    const tm = findTeammate(p, teammates);
    if (tm && Math.random() < 0.025) {
      passBall(p, tm);
      return;
    }

    // Dribble toward goal
    const dribDir = isHomeTeam ? -1 : 1;
    p.vx = (WORLD_W / 2 - p.x) * 0.02 + (Math.random() - 0.5) * 1.6;
    p.vy = DRIBBLE_SPEED * dribDir + (Math.random() - 0.5) * 0.6;
    return;
  }

  // --- Anti-swarm: role-based movement ---

  // Designated chaser (nearest to ball) — moves aggressively toward ball
  if (roles.chaser === p && !ball.owner) {
    p.state = 'chasing';
    moveToward(p, ball.x, ball.y, p.speed);
    if (dist(p.x, p.y, ball.x, ball.y) < 24) {
      ball.owner = p; ball.lastTouchedBy = p;
      ball.free = false;
      p.state = 'hasBall';
    }
    return;
  }

  // Support runner (2nd nearest) — positions ~80px ahead of ball in attack direction
  if (roles.support === p && !ball.owner) {
    const supportDir = isHomeTeam ? -1 : 1;
    const sx = ball.x + ((ball.x < WORLD_W / 2) ? 60 : -60);
    const sy = ball.y + supportDir * 80;
    moveToward(p, sx, sy, p.speed * 0.7);
    if (dist(p.x, p.y, ball.x, ball.y) < 20) {
      ball.owner = p; ball.lastTouchedBy = p;
      ball.free = false;
      p.state = 'hasBall';
    }
    return;
  }

  // If ball owned by opponent nearby — try to tackle (even formation holders)
  if (ball.owner && ball.owner.team !== p.team) {
    const dToBallCarrier = dist(p.x, p.y, ball.owner.x, ball.owner.y);
    if (dToBallCarrier < 120) {
      moveToward(p, ball.owner.x, ball.owner.y, p.speed * 0.9);
      if (dToBallCarrier < TACKLE_RANGE) {
        attemptTackle(p, ball.owner);
      }
      return;
    }
  }

  // Forward off-ball diagonal runs when teammate has ball
  if (p.position === 'FW' && myTeamHasBall) {
    const runDir = isHomeTeam ? -1 : 1;
    const lateralDir = (p.number % 2 === 0) ? 1 : -1;
    const runX = Math.max(PITCH_L + 20, Math.min(PITCH_R - 20, p.homeX + lateralDir * 40));
    const runY = Math.max(PITCH_T + 20, Math.min(PITCH_B - 20, p.homeY + runDir * 60));
    const dx = runX - p.x, dy = runY - p.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 20) {
      p.vx = (dx / d) * p.speed * 0.5;
      p.vy = (dy / d) * p.speed * 0.5;
    }
    p.state = 'idle';
    return;
  }

  // Formation holders — drift toward shifted home position (elastic spring-back)
  p.state = 'idle';
  const home = getShiftedHomePos(p, myTeamHasBall, isHomeTeam);
  const dx = home.x - p.x, dy = home.y - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > 60) {
    // Drift at 40% speed when far from formation
    p.vx = (dx / d) * p.speed * 0.4;
    p.vy = (dy / d) * p.speed * 0.4;
  } else {
    // Small idle jitter near home position
    p.vx = (Math.random() - 0.5) * 0.5;
    p.vy = (Math.random() - 0.5) * 0.5;
  }
}

function updateGK(gk, opponents) {
  const goalY = gk.team === 0 ? PITCH_B - 12 : PITCH_T + 12;
  const goalCenterX = WORLD_W / 2;

  // Track ball laterally
  const targetX = Math.max(GOAL_L + 5, Math.min(GOAL_R - 5, ball.x));

  // Rush out for close balls
  let targetY = goalY;
  const ballDistToGoal = dist(ball.x, ball.y, goalCenterX, goalY);
  if (ballDistToGoal < 240 && !ball.owner) {
    targetY = goalY + (ball.y - goalY) * 0.3;
  }

  moveToward(gk, targetX, targetY, GK_SPEED);

  // Save attempt — if ball heading toward goal fast
  if (!ball.owner && Math.abs(ball.vy) > 3) {
    const goalDir = gk.team === 0 ? 1 : -1; // ball going toward our goal?
    if (ball.vy * goalDir > 0) {
      const timeToGoal = Math.abs((goalY - ball.y) / ball.vy);
      const ballArriveX = ball.x + ball.vx * timeToGoal;
      if (timeToGoal < 30 && ballArriveX > GOAL_L - 20 && ballArriveX < GOAL_R + 20) {
        // Dive!
        moveToward(gk, ballArriveX, ball.y, GK_SPEED * 1.5);
        if (dist(gk.x, gk.y, ball.x, ball.y) < 40) {
          // Save!
          AudioManager.playSave();
          ball.vx = (Math.random() - 0.5) * 6;
          ball.vy = -ball.vy * 0.3;
          ball.owner = null;
          if (Math.random() < 0.3) {
            const shooterName = findNearestPlayerName(opponents, ball.x, ball.y);
            const gkRoster = findPlayerInRoster(gk.lastName, gk.team);
            addCommentary('default', pickComment('shot_saved', { keeper: gk.lastName, keeper_fact: getPlayerFact(gkRoster) }));
          }
        }
      }
    }
  }

  // Pick up ball if close
  if (!ball.owner && dist(gk.x, gk.y, ball.x, ball.y) < 30) {
    ball.owner = gk;
    ball.free = false;
    // Kick it out
    setTimeout(() => {
      if (ball.owner === gk) {
        const tm = findTeammate(gk, gk.team === 0 ? homePlayers : awayPlayers);
        if (tm) passBall(gk, tm);
        else {
          ball.vx = (Math.random() - 0.5) * 8;
          ball.vy = (gk.team === 0 ? -1 : 1) * 10;
          ball.owner = null;
          ball.free = true;
        }
      }
    }, 500);
  }
}

function findNearestPlayerName(players, x, y) {
  let nearest = null, minD = Infinity;
  for (const p of players) {
    if (p.sentOff) continue;
    const d = dist(p.x, p.y, x, y);
    if (d < minD) { minD = d; nearest = p; }
  }
  return nearest ? nearest.lastName : 'someone';
}

// ---- TACKLING ----
function attemptTackle(tackler, ballCarrier) {
  const roll = Math.random();
  if (roll < 0.4) {
    // Clean tackle
    ball.owner = null;
    ball.free = true;
    ball.vx = (Math.random() - 0.5) * 6;
    ball.vy = (Math.random() - 0.5) * 6;
    ballCarrier.state = 'idle';
  } else if (roll < 0.75) {
    // Foul
    ball.owner = null;
    ball.free = true;
    ball.vx = 0;
    ball.vy = 0;
    ball.x = ballCarrier.x;
    ball.y = ballCarrier.y;
    const minute = Math.floor(matchClock);
    addCommentary('card', pickComment('foul', { fouler: tackler.lastName, victim: ballCarrier.lastName }));

    // Card chance
    if (Math.random() < 0.15) {
      AudioManager.playCard();
      addCommentary('card', `Yellow card shown to ${tackler.lastName}!`);
      if (Math.random() < 0.05) {
        addCommentary('card', `That's a SECOND yellow! ${tackler.lastName} is OFF!`);
        tackler.sentOff = true;
        tackler.state = 'sentOff';
        comedyStats.redCards++;
        // Red card: screen flash + player walks off
        addEffect('red_flash', 0, 0);
      }
    }
  } else {
    // Comedy foul — theatrical dive by the victim
    theatricalDive(ballCarrier, tackler);
  }
}

// ---- COMEDY EVENTS ----
function theatricalDive(victim, fouler) {
  AudioManager.playComedy();
  victim.state = 'diving';
  victim.stateTimer = 60;
  const slideDir = (Math.random() > 0.5 ? 1 : -1);
  victim.slideX = slideDir * 40; // 40px slide with rotation
  victim.slideY = -10;
  comedyStats.dives++;
  window.DEBUG_STATS.dives++;
  // Visual effects: stars around victim + slide animation
  addEffect('stars', victim.x, victim.y);
  addEffect('slide', victim.x, victim.y, {dx: slideDir, dy: -0.3, kitColor: victim.shirtColor});
  addEffect('dust', victim.x + slideDir * 30, victim.y, {dir: slideDir});
  // Per-player tracking for escalating commentary
  const pec = trackPlayerEvent(victim.name, 'dives');
  const diverRoster = findPlayerInRoster(victim.lastName, victim.team);
  const diveType = pec.dives >= 3 ? 'dive_hat_trick' : pec.dives >= 2 ? 'dive_repeat' : 'dive';
  const diveVars = {
    player: victim.lastName,
    player_fact: getPlayerFact(diverRoster),
    n: pec.dives,
  };
  addCommentary('comedy', pickComment(diveType, diveVars));
  ball.owner = null;
  ball.free = true;
}

function triggerVAR() {
  if (varActive) return;
  AudioManager.playVAR();
  varActive = true;
  varTimer = 180;
  comedyStats.varReviews++;
  window.DEBUG_STATS.varReviews++;
  // Visual: purple overlay with dashed rectangle on pitch around ball area
  addEffect('var_overlay', ball.x, ball.y, {duration: 3.5});
  addCommentary('var', pickComment('var'));

  const results = [
    'NO GOAL — ball was 0.3mm offside',
    'PENALTY!',
    'NO FOUL — play on',
    'GOAL STANDS — after 4 minutes of squinting',
    'YELLOW CARD UPGRADED TO RED... no wait, downgraded to a stern look',
    'DECISION: referee had something in his eye',
  ];
  varResult = results[Math.floor(Math.random() * results.length)];
}

function triggerMassConfrontation() {
  AudioManager.playComedy();
  comedyStats.fights++;
  window.DEBUG_STATS.fights++;
  triggerComedyCooldown();
  // 8-10 players from both teams involved
  const allP = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff && p.state !== 'sentOff');
  const fighters = allP.sort((a,b) => dist(a.x,a.y,ball.x,ball.y)-dist(b.x,b.y,ball.x,ball.y)).slice(0, Math.min(10, allP.length));
  const cx = ball.x, cy = ball.y;
  for (const p of fighters) {
    p.state = 'fighting';
    p.stateTimer = 300; // 5 seconds at 60fps
    moveToward(p, cx + (Math.random()-0.5)*40, cy + (Math.random()-0.5)*40, p.speed);
    trackPlayerEvent(p.name, 'fights');
  }
  // Referee runs into fight
  if (typeof ref !== 'undefined') { ref.inFight = true; ref.fightX = cx; ref.fightY = cy; }
  // Visual effects
  addEffect('exclaim', cx, cy);
  addEffect('exclaim', cx - 25, cy + 15);
  addEffect('exclaim', cx + 30, cy - 20);
  const zones = ['halfway line', 'penalty area', 'corner flag', 'centre circle'];
  const fightVars = { zone: zones[Math.floor(Math.random() * zones.length)], fouler: fighters[0]?.lastName || 'Someone' };
  addCommentary('comedy', pickComment('fight', fightVars));
  // After 5 seconds: card decision
  setTimeout(() => {
    if (typeof ref !== 'undefined') ref.inFight = false;
    fighters.forEach(p => { if (p.state === 'fighting') p.state = 'idle'; });
    const victim = fighters[Math.floor(Math.random() * fighters.length)];
    if (!victim || victim.sentOff) return;
    const rand = Math.random();
    if (rand < 0.15) {
      // RED CARD
      victim.sentOff = true; victim.state = 'walkingOff';
      victim.walkOffTargetX = victim.x < WORLD_W/2 ? PITCH_L - 50 : PITCH_R + 50;
      victim.walkOffTargetY = victim.y;
      AudioManager.playCard(); AudioManager.playWhistle(false);
      addEffect('red_flash', ball.x, ball.y, {duration: 0.4});
      addCommentary('card', `RED CARD! ${victim.lastName} is given his marching orders! Incredible scenes.`);
      window.DEBUG_STATS.reds = (window.DEBUG_STATS.reds||0)+1;
    } else if (rand < 0.75) {
      AudioManager.playCard();
      addCommentary('card', `Yellow card for ${victim.lastName}. Not the last one tonight, probably.`);
    }
  }, 5000);
}

function triggerKeeperRush(team) {
  const gk = (team === 0 ? homePlayers : awayPlayers).find(p => p.position === 'GK' && !p.sentOff);
  if (!gk) return;
  gk.homeX = WORLD_W / 2;
  gk.homeY = WORLD_H / 2;
  moveToward(gk, WORLD_W / 2 + (Math.random() - 0.5) * 200, WORLD_H / 2, GK_SPEED);
  addCommentary('comedy', pickComment('keeper_rush', { keeper: gk.lastName }));
  setTimeout(() => {
    gk.homeX = WORLD_W / 2;
    gk.homeY = team === 0 ? PITCH_B - 12 : PITCH_T + 12;
  }, 4000);
}

function triggerPitchInvader() {
  comedyStats.pitchInvaders++;
  pitchInvader = {
    x: PITCH_L, y: PITCH_T + Math.random() * PH,
    vx: 5 + Math.random() * 2, vy: (Math.random() - 0.5) * 4,
    timer: 200,
    steward: { x: PITCH_L - 40, y: PITCH_T + PH / 2 }
  };
  // Visual: silhouette zigzagging with steward chase
  addEffect('invader', PITCH_L, PITCH_T + Math.random() * PH);
  addCommentary('comedy', "A pitch invader has breached security! Stewards in pursuit! Players scattering like startled pigeons!");
}

function triggerOwnGoal(team) {
  const defenders = (team === 0 ? homePlayers : awayPlayers).filter(p => p.position === 'DF' && !p.sentOff);
  if (!defenders.length) return;
  const unlucky = defenders[Math.floor(Math.random() * defenders.length)];
  const ownGoalY = team === 0 ? PITCH_B + 5 : PITCH_T - 5;
  ball.x = unlucky.x;
  ball.y = unlucky.y;
  ball.vx = (WORLD_W / 2 - unlucky.x) * 0.05;
  ball.vy = (ownGoalY - unlucky.y) * 0.04;
  ball.owner = null;
  ball.free = true;
  const ogVars = { player: unlucky.lastName, score: `${homeScore}–${awayScore}` };
  addCommentary('comedy', pickComment('own_goal', ogVars));
}

function triggerDoubleRedCard(team) {
  const players = (team === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff && p.position !== 'GK');
  if (players.length < 2) return;
  AudioManager.playCard();
  const [p1, p2] = players.sort(() => Math.random() - 0.5).slice(0, 2);
  p1.sentOff = true; p1.state = 'sentOff';
  p2.sentOff = true; p2.state = 'sentOff';
  comedyStats.redCards += 2;
  addEffect('red_flash', 0, 0);
  addCommentary('card', `DOUBLE RED CARD! ${p1.lastName} and ${p2.lastName} sent off for fighting EACH OTHER! Same team! Absolute chaos!`);
}

function checkComedyEvents() {
  if (varActive || gameState !== 'playing') return;
  if (!canTriggerComedy()) return; // 10-second cooldown between all comedy events
  const t = matchClock / 90; // progress factor

  if (Math.random() < 0.001 * (1 + t)) {
    triggerComedyCooldown();
    const victim = randomPlayer(Math.random() < 0.5 ? homePlayers : awayPlayers);
    const fouler = randomPlayer(Math.random() < 0.5 ? awayPlayers : homePlayers);
    theatricalDive(victim, fouler);
    return;
  }
  if (Math.random() < 0.0003 * (1 + t * 2)) {
    triggerComedyCooldown();
    triggerMassConfrontation();
    return;
  }
  if (Math.random() < 0.0004) {
    triggerComedyCooldown();
    triggerKeeperRush(Math.random() < 0.5 ? 0 : 1);
    return;
  }
  if (Math.random() < 0.0003 * (1 + t)) {
    triggerComedyCooldown();
    triggerVAR();
    return;
  }
  if (Math.random() < 0.0001) {
    triggerComedyCooldown();
    triggerPitchInvader();
    return;
  }
  if (Math.random() < 0.001) {
    triggerComedyCooldown();
    triggerOwnGoal(Math.random() < 0.5 ? 0 : 1);
    return;
  }
  if (Math.random() < 0.00005) {
    triggerComedyCooldown();
    triggerDoubleRedCard(Math.random() < 0.5 ? 0 : 1);
    return;
  }
}

function randomPlayer(players) {
  const valid = players.filter(p => !p.sentOff && p.state === 'idle');
  return valid.length ? valid[Math.floor(Math.random() * valid.length)] : players[0];
}

// ---- COMMENTARY ----
function addCommentary(type, text) {
  if (!text) return;
  lastCommentaryTime = Date.now();
  const minute = Math.floor(matchClock);
  const el = $('commentary');
  const cls = type === 'goal' ? 'goal' : type === 'card' ? 'card' : type === 'comedy' ? 'comedy' : type === 'var' ? 'var' : type === 'info' ? '' : '';
  const div = document.createElement('div');
  div.className = 'event ' + cls;
  div.innerHTML = `<span class="min">${minute}'</span>${text}`;
  el.insertBefore(div, el.firstChild);
  // Trim old
  while (el.children.length > 50) el.removeChild(el.lastChild);
}

// ---- SCOREBOARD ----
function updateScoreboard() {
  $('sbScore').textContent = `${homeScore} – ${awayScore}`;
  $('clockDisplay').textContent = `${Math.floor(matchClock)}'`;
}

// ---- MAIN GAME LOOP ----
function gameLoop() {
  animId = requestAnimationFrame(gameLoop);

  if (gameState === 'teamSelect' || gameState === 'fulltime') return;

  // VAR pause
  if (varActive) {
    varTimer--;
    if (varTimer <= 0) {
      varActive = false;
      addCommentary('var', `VAR decision: ${varResult}`);
      if (varResult === 'PENALTY!') {
        // Give ball to random attacker near penalty spot
        const team = Math.random() < 0.5 ? 0 : 1;
        const players = team === 0 ? homePlayers : awayPlayers;
        const taker = players.find(p => !p.sentOff && p.position === 'FW') || players.find(p => !p.sentOff && p.position !== 'GK');
        if (taker) {
          const penY = team === 0 ? PITCH_T + 110 : PITCH_B - 110;
          taker.x = WORLD_W / 2;
          taker.y = penY;
          ball.x = WORLD_W / 2;
          ball.y = penY;
          ball.owner = taker;
          ball.free = false;
        }
      }
    }
    drawFrame();
    return;
  }

  // Pause (goal celebration, halftime)
  if (pauseTimer > 0) {
    pauseTimer--;
    if (pauseTimer <= 0) {
      if (gameState === 'goalScored') {
        gameState = 'playing';
        resetPositions();
      } else if (gameState === 'halftime') {
        gameState = 'playing';
        // Swap sides
        swapSides();
        addCommentary('default', `Second half underway! ${awayTeamName} kick off.`);
      }
    }
    drawFrame();
    return;
  }

  // Match clock
  if (gameState === 'playing') {
    realTick++;
    matchClock = realTick / TICKS_PER_MINUTE;

    // Halftime
    if (!halfSwapped && matchClock >= 45) {
      AudioManager.playWhistle(false);
      AudioManager.setCrowd(0.05);
      gameState = 'halftime';
      halfSwapped = true;
      pauseTimer = 180;
      snapCamera(WORLD_W / 2, WORLD_H / 2);
      const htVars = {
        home: homeTeamName, away: awayTeamName,
        hs: homeScore, as: awayScore,
        home_nick: TEAM_NICKNAMES[homeTeamName] || homeTeamName,
        away_nick: TEAM_NICKNAMES[awayTeamName] || awayTeamName,
        anecdote: getTeamAnecdote(homeScore >= awayScore ? homeTeamName : awayTeamName),
      };
      addCommentary('info', pickComment('halftime', htVars));
      updateScoreboard();
      drawFrame();
      return;
    }

    // Full time
    if (matchClock >= 90) {
      AudioManager.playWhistle(true);
      AudioManager.setCrowd(0.6);
      gameState = 'fulltime';
      const ftVars = {
        home: homeTeamName, away: awayTeamName,
        hs: homeScore, as: awayScore,
        home_nick: TEAM_NICKNAMES[homeTeamName] || homeTeamName,
        away_nick: TEAM_NICKNAMES[awayTeamName] || awayTeamName,
        anecdote: getTeamAnecdote(homeScore > awayScore ? homeTeamName : awayTeamName),
      };
      addCommentary('info', pickComment('fulltime', ftVars));
      updateScoreboard();
      showResult();
      return;
    }

    updateScoreboard();

    // Update ball
    updateBall();

    // Update players
    const homeRoles = getChaseRoles(homePlayers);
    const awayRoles = getChaseRoles(awayPlayers);
    for (const p of homePlayers) { updatePlayerAI(p, homePlayers, awayPlayers, homeRoles); applyVelocity(p); }
    for (const p of awayPlayers) { updatePlayerAI(p, awayPlayers, homePlayers, awayRoles); applyVelocity(p); }

    // Update camera
    updateCamera();

    // Ball pickup (free ball)
    if (!ball.owner) {
      const all = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff && p.state !== 'diving' && p.state !== 'celebrating');
      for (const p of all) {
        if (dist(p.x, p.y, ball.x, ball.y) < 20) {
          ball.owner = p; ball.lastTouchedBy = p;
          ball.free = false;
          p.state = 'hasBall';
          break;
        }
      }
    }

    // Crowd intensity modulation based on ball position
    if (realTick % 30 === 0) {
      const nearGoalTop = Math.max(0, 1 - dist(ball.x, ball.y, WORLD_W/2, PITCH_T) / 500);
      const nearGoalBot = Math.max(0, 1 - dist(ball.x, ball.y, WORLD_W/2, PITCH_B) / 500);
      AudioManager.setCrowd(0.15 + Math.max(nearGoalTop, nearGoalBot) * 0.5);
    }

    // Comedy events
    checkComedyEvents();

    // Idle commentary — team anecdotes between events
    if (Date.now() - lastCommentaryTime > IDLE_INTERVAL) {
      const idleTeam = Math.random() > 0.5 ? homeTeamName : awayTeamName;
      const anec = getTeamAnecdote(idleTeam);
      if (anec) addCommentary('info', anec);
    }

    // Pitch invader update
    if (pitchInvader) {
      pitchInvader.x += pitchInvader.vx;
      pitchInvader.y += pitchInvader.vy;
      pitchInvader.timer--;
      if (pitchInvader.steward) {
        moveToward(pitchInvader.steward, pitchInvader.x, pitchInvader.y, 2);
        pitchInvader.steward.x += (pitchInvader.x - pitchInvader.steward.x) * 0.02;
        pitchInvader.steward.y += (pitchInvader.y - pitchInvader.steward.y) * 0.02;
      }
      if (pitchInvader.timer <= 0 || pitchInvader.x > PITCH_R + 60) {
        pitchInvader = null;
        addCommentary('comedy', 'The pitch invader has been escorted off. Normal service resumes.');
      }
    }
  }

  drawFrame();
}

function applyVelocity(p) {
  if (p.sentOff) return;
  p.x += p.vx;
  p.y += p.vy;
  p.vx *= 0.9;
  p.vy *= 0.9;

  // Keep on pitch (with slight margin for GKs)
  const margin = p.position === 'GK' ? -10 : 5;
  p.x = Math.max(PITCH_L + margin, Math.min(PITCH_R - margin, p.x));
  p.y = Math.max(PITCH_T + margin, Math.min(PITCH_B - margin, p.y));
}

function resetPositions() {
  for (const p of homePlayers) { p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0; if (p.state !== 'sentOff') p.state = 'idle'; }
  for (const p of awayPlayers) { p.x = p.homeX; p.y = p.homeY; p.vx = 0; p.vy = 0; if (p.state !== 'sentOff') p.state = 'idle'; }
  ball.x = WORLD_W / 2; ball.y = WORLD_H / 2; ball.vx = 0; ball.vy = 0; ball.owner = null; ball.free = true;
  snapCamera(WORLD_W / 2, WORLD_H / 2);
}

function swapSides() {
  for (const p of homePlayers) {
    p.homeX = WORLD_W - p.homeX;
    p.homeY = WORLD_H - p.homeY;
  }
  for (const p of awayPlayers) {
    p.homeX = WORLD_W - p.homeX;
    p.homeY = WORLD_H - p.homeY;
  }
  resetPositions();
}

// ---- MINIMAP ----
function drawMinimap() {
  const mw = 120, mh = 78;
  const mx = CW - mw - 10, my = CH - mh - 10;
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(mx, my, mw, mh);
  // Pitch outline
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx + 2, my + 2, mw - 4, mh - 4);
  // Camera viewport rect
  const vx = mx + (camera.x / WORLD_W) * mw;
  const vy = my + (camera.y / WORLD_H) * mh;
  const vw = (CW / WORLD_W) * mw;
  const vh = (CH / WORLD_H) * mh;
  ctx.strokeStyle = 'rgba(240,196,76,0.7)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);
  // Players as dots
  const allP = [...homePlayers, ...awayPlayers];
  for (const p of allP) {
    if (p.sentOff) continue;
    const px = mx + (p.x / WORLD_W) * mw;
    const py = my + (p.y / WORLD_H) * mh;
    ctx.fillStyle = p.team === 0 ? '#fff' : '#f0c44c';
    ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // Ball
  const bx = mx + (ball.x / WORLD_W) * mw;
  const by = my + (ball.y / WORLD_H) * mh;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI * 2); ctx.fill();
}

function drawFrame() {
  ctx.clearRect(0, 0, CW, CH);

  // === WORLD SPACE (camera-offset) ===
  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));

  drawPitch(ctx);
  const allPlayers = [...homePlayers, ...awayPlayers].sort((a, b) => a.y - b.y);
  for (const p of allPlayers) drawPlayer(ctx, p);
  drawReferee(ctx);
  drawBall(ctx);
  drawPitchInvader(ctx);
  updateAndDrawEffects(); // Visual effects in world space

  ctx.restore();

  // === SCREEN SPACE (HUD) ===
  drawVAR(ctx);

  // VAR overlay text in screen space (from activeEffects)
  const varEffects = activeEffects.filter(e => e.type === 'var_overlay');
  if (varEffects.length > 0) {
    const age = (Date.now() - varEffects[0].startTime) / 1000;
    if (age < varEffects[0].duration - 0.5) {
      ctx.fillStyle = 'rgba(180,0,255,0.9)';
      ctx.font = "bold 28px 'Anton', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText('VAR REVIEWING...', CW / 2, CW > 600 ? CH / 2 - 20 : CH / 2 - 10);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = "14px 'Space Mono', monospace";
      const messages = ['Checking handball...', 'Reviewing offside...', 'Checking for simulation...'];
      const idx = Math.floor(age * 2) % messages.length;
      ctx.fillText(messages[idx], CW / 2, CH / 2 + 14);
    } else if (age < varEffects[0].duration) {
      const result = Math.random() > 0.5 ? 'NO GOAL!' : 'PENALTY!';
      ctx.fillStyle = '#f0c44c';
      ctx.font = "bold 42px 'Anton', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(result, CW / 2, CH / 2);
    }
  }

  // Red card screen flash (screen-space)
  const redFlash = activeEffects.find(e => e.type === 'red_flash');
  if (redFlash) {
    const age = (Date.now() - redFlash.startTime) / 1000;
    if (age < 0.3) {
      ctx.fillStyle = `rgba(220,30,30,${0.3 * (1 - age / 0.3)})`;
      ctx.fillRect(0, 0, CW, CH);
    }
  }

  drawMinimap();

  // Halftime overlay
  if (gameState === 'halftime') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#f0c44c';
    ctx.font = "bold 36px 'Anton', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('HALF TIME', CW / 2, CH / 2 - 10);
    ctx.font = "16px 'Space Mono', monospace";
    ctx.fillStyle = '#fff';
    ctx.fillText(`${homeTeamName} ${homeScore} – ${awayScore} ${awayTeamName}`, CW / 2, CH / 2 + 20);
  }

  // Goal scored overlay
  if (gameState === 'goalScored' && pauseTimer > 60) {
    ctx.fillStyle = 'rgba(240,196,76,0.15)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#f0c44c';
    ctx.font = "bold 48px 'Anton', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GOAL!', CW / 2, CH / 2);
  }
}

// ---- RESULT SCREEN ----
function showResult() {
  $('matchView').classList.remove('active');
  $('resultScreen').classList.add('active');

  $('resScore').textContent = `${homeScore} – ${awayScore}`;
  $('resTeams').textContent = `${homeTeamName} vs ${awayTeamName}`;

  // Scorers
  const scorerLines = goalScorers.map(g => `⚽ ${g.player.lastName} ${g.minute}' (${g.team})`).join('<br>');
  $('resScorers').innerHTML = scorerLines || 'No goals. A defensive masterclass. Or terrible finishing.';

  // Man of the match
  const allPlayers = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff);
  let motm = allPlayers.sort((a, b) => b.goals - a.goals)[0];
  const funnyReasons = [
    'Most hair-ruffling celebrations',
    'Least offside decisions against them',
    'Best at pretending to be injured',
    'Survived the entire match without getting into a fight',
    'Only player who remembered which goal to attack',
    'Completed more passes than arguments with the referee',
  ];
  let motmReason = motm && motm.goals > 0 ? `${motm.goals} goal${motm.goals > 1 ? 's' : ''}` : funnyReasons[Math.floor(Math.random() * funnyReasons.length)];
  if (!motm) { motm = allPlayers[0]; }

  $('resMotm').innerHTML = `
    <div class="label">Man of the Match</div>
    <div class="name">${motm ? motm.name : '???'}</div>
    <div class="reason">${motmReason}</div>
  `;

  // Narrative comedy stats
  const narratives = [
    narrativeStat(comedyStats.dives, comedyNarratives.dives),
    narrativeStat(comedyStats.varReviews, comedyNarratives.varReviews),
    narrativeStat(comedyStats.fights, comedyNarratives.fights),
    narrativeStat(comedyStats.redCards, comedyNarratives.redCards),
    narrativeStat(comedyStats.pitchInvaders, comedyNarratives.pitchInvaders),
    narrativeStat(comedyStats.selfies, comedyNarratives.selfies),
  ].filter(Boolean).join('');
  $('resStats').innerHTML = narratives || '<div class="rs-stat">A remarkably clean match. Suspicious, frankly.</div>';
}

// ---- KICK OFF ----
async function startMatch() {
  homeTeamName = $('homeSelect').value;
  awayTeamName = $('awaySelect').value;

  $('teamSelect').classList.add('hidden');
  $('matchView').classList.add('active');

  canvas = $('pitchCanvas');
  ctx = canvas.getContext('2d');

  // User click interaction
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (CW / rect.width);
    const sy = (e.clientY - rect.top) * (CH / rect.height);
    const wx = sx + camera.x, wy = sy + camera.y;
    handlePitchClick(wx, wy);
  };
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseWorldX = (e.clientX - rect.left) * (CW / rect.width) + camera.x;
    mouseWorldY = (e.clientY - rect.top) * (CH / rect.height) + camera.y;
  };

  // Set scoreboard
  const homeMeta = TEAM_META[homeTeamName];
  const awayMeta = TEAM_META[awayTeamName];
  $('sbHomeName').textContent = homeTeamName;
  $('sbAwayName').textContent = awayTeamName;
  $('sbHomeFlag').src = `assets/teams/${homeMeta.slug}/flag.svg`;
  $('sbHomeFlag').onerror = function() { this.src = `https://flagcdn.com/${homeMeta.flagcdn}.svg`; };
  $('sbAwayFlag').src = `assets/teams/${awayMeta.slug}/flag.svg`;
  $('sbAwayFlag').onerror = function() { this.src = `https://flagcdn.com/${awayMeta.flagcdn}.svg`; };

  // Load data
  homeData = await loadTeamData(homeTeamName);
  awayData = await loadTeamData(awayTeamName);

  // Create players
  homePlayers = createPlayers(homeData, homeTeamName, 0);
  awayPlayers = createPlayers(awayData, awayTeamName, 1);

  // Build sprite caches (uses player img objects loaded in createPlayers)
  const homeImgs = {}; homePlayers.forEach(p => { homeImgs[p.number] = p.img; });
  const awayImgs = {}; awayPlayers.forEach(p => { awayImgs[p.number] = p.img; });
  buildSpriteCache(TEAM_META[homeTeamName]?.slug || '', homePlayers, homeImgs);
  buildSpriteCache(TEAM_META[awayTeamName]?.slug || '', awayPlayers, awayImgs);

  // Reset state
  homeScore = 0; awayScore = 0;
  matchClock = 0; realTick = 0;
  halfSwapped = false;
  goalScorers = [];
  comedyStats = { dives: 0, varReviews: 0, fights: 0, redCards: 0, pitchInvaders: 0, selfies: 0 };
  events = [];
  ball = { x: WORLD_W / 2, y: WORLD_H / 2, vx: 0, vy: 0, owner: null, free: true };
  varActive = false;
  pitchInvader = null;
  lastComedyTime = 0;
  lastCommentaryTime = 0;
  activeEffects.length = 0;
  playerEventCounts.clear();
  $('commentary').innerHTML = '';

  // Snap camera to center for kickoff
  snapCamera(WORLD_W / 2, WORLD_H / 2);

  updateScoreboard();

  // Show pre-match banter overlay, then kick off
  showPrematch(homeTeamName, awayTeamName, function actualKickoff() {
    const homeNick = TEAM_NICKNAMES[homeTeamName] || homeTeamName;
    const awayNick = TEAM_NICKNAMES[awayTeamName] || awayTeamName;
    AudioManager.playWhistle(false);
    AudioManager.setCrowd(0.2);
    const koVars = {
      home: homeTeamName, away: awayTeamName,
      home_nick: homeNick, away_nick: awayNick,
      home_anecdote: getTeamAnecdote(homeTeamName),
    };
    addCommentary('info', pickComment('kick_off', koVars));

    const striker = homePlayers.find(p => p.position === 'FW' && !p.sentOff);
    if (striker) {
      striker.x = WORLD_W / 2 + 5;
      striker.y = WORLD_H / 2 + 5;
      ball.owner = striker;
      ball.free = false;
    }

    gameState = 'playing';

    if (animId) cancelAnimationFrame(animId);
    gameLoop();
  });
}

// ---- REMATCH ----
function rematch() {
  $('resultScreen').classList.remove('active');
  if (animId) cancelAnimationFrame(animId);
  gameState = 'teamSelect';
  startMatch();
}

// ---- PRE-MATCH BANTER ----
// ---- Inline MIDI Parser ----
function parseMidi(buf) {
  const d = new Uint8Array(buf); let p = 0;
  const u32=()=>(d[p++]<<24)|(d[p++]<<16)|(d[p++]<<8)|d[p++];
  const u16=()=>(d[p++]<<8)|d[p++];
  const vlq=()=>{let v=0,b;do{b=d[p++];v=(v<<7)|(b&0x7f);}while(b&0x80);return v;};
  p=8; const fmt=u16(),trks=u16(),div=u16(); const notes=[];
  for(let t=0;t<trks;t++){
    p+=4; const end=p+u32(); let tk=0,ls=0; const on={};
    while(p<end){
      tk+=vlq(); let st=d[p]; if(st<0x80){st=ls;}else{p++;ls=st;}
      const tp=st&0xF0;
      if(tp===0x90){const n=d[p++],v=d[p++];if(v>0){on[n]={t:tk,v};}else if(on[n]){notes.push({t:on[n].t/div,n,v:on[n].v,dur:(tk-on[n].t)/div});delete on[n];}}
      else if(tp===0x80){const n=d[p++];p++;if(on[n]){notes.push({t:on[n].t/div,n,v:on[n].v,dur:(tk-on[n].t)/div});delete on[n];}}
      else if(tp===0xC0||tp===0xD0){p++;}
      else if(tp===0xFF){p++;const l=vlq();p+=l;}
      else if(tp===0xF0||tp===0xF7){const l=vlq();p+=l;}
      else{p+=2;}
    }
    for(const n in on)notes.push({t:on[n].t/div,n:+n,v:on[n].v,dur:0.1});
  }
  return {div,notes:notes.sort((a,b)=>a.t-b.t)};
}

function scheduleMidi(midiData, maxSec=10, tempo=120) {
  const ac = AudioManager.ctx;
  if (!ac || AudioManager.muted) return;
  const bps = tempo/60;
  const mg = ac.createGain(); mg.gain.value=0.25; mg.connect(ac.destination);
  for(const n of midiData.notes){
    const s=n.t/bps; if(s>maxSec) break;
    const dur=Math.min(n.dur/bps,1.4);
    const freq=440*Math.pow(2,(n.n-69)/12);
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.type='square'; osc.frequency.value=freq;
    g.gain.setValueAtTime((n.v/127)*0.35, ac.currentTime+s);
    g.gain.linearRampToValueAtTime(0, ac.currentTime+s+dur);
    osc.connect(g); g.connect(mg);
    osc.start(ac.currentTime+s); osc.stop(ac.currentTime+s+dur+0.05);
  }
}

async function playAnthemMidi(slug, maxSec=10) {
  if (!AudioManager.ctx || AudioManager.muted) return 2000;
  try {
    const resp = await fetch(`assets/teams/${slug}/anthem.mid`);
    if (!resp.ok) return 2000;
    scheduleMidi(parseMidi(await resp.arrayBuffer()), maxSec);
    return maxSec * 1000;
  } catch(e) { return 2000; }
}

async function showPrematch(homeName, awayName, onComplete) {
  const overlay = $('prematchOverlay');
  const homeSlug = TEAM_META[homeName]?.slug || '';
  const awaySlug = TEAM_META[awayName]?.slug || '';

  // Walk players out to lineup positions at halfway line
  homePlayers.forEach((p,i) => {
    p.x = PITCH_L + PW*(0.15 + (i%11)*0.068);
    p.y = WORLD_H/2 + 45 + Math.floor(i/6)*35;
  });
  awayPlayers.forEach((p,i) => {
    p.x = PITCH_L + PW*(0.15 + (i%11)*0.068);
    p.y = WORLD_H/2 - 45 - Math.floor(i/6)*35;
  });
  snapCamera(WORLD_W/2, WORLD_H/2);

  // Build anthem name display
  const homeAnthemName = (ANTHEM_TRANSLATIONS?.[homeName])?.[0] || '';
  const awayAnthemName = (ANTHEM_TRANSLATIONS?.[awayName])?.[0] || '';

  // Home anthem
  $('pmHomeName').textContent = homeName + (TEAM_NICKNAMES[homeName] ? ` — ${TEAM_NICKNAMES[homeName]}` : '');
  $('pmAwayName').textContent = '';
  $('pmHomeAnecdote').textContent = homeAnthemName ? `♪ ${homeAnthemName} ♪` : '♪ National Anthem ♪';
  $('pmAwayAnecdote').textContent = '';
  $('pmTimer').textContent = '10';
  overlay.style.display = 'flex';

  // Add skip button to overlay
  let skipCeremony = false;
  const skipBtn = document.createElement('button');
  skipBtn.textContent = 'Skip ▶';
  skipBtn.style.cssText = 'font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;background:none;border:1px solid var(--line);color:var(--chalk-faint);border-radius:999px;padding:5px 16px;margin-top:20px;cursor:pointer;';
  skipBtn.onclick = () => { skipCeremony = true; };
  overlay.appendChild(skipBtn);

  const waitMs = (ms) => new Promise(r => {
    const start = Date.now();
    const check = setInterval(() => {
      if (skipCeremony || Date.now() - start >= ms) { clearInterval(check); r(); }
    }, 100);
  });

  // Home anthem
  let t=10;
  const homeTimer = setInterval(()=>{ t--; if ($('pmTimer')) $('pmTimer').textContent=Math.max(0,t); if(t<=0)clearInterval(homeTimer); }, 1000);
  const homeDur = await playAnthemMidi(homeSlug, 10).catch(()=>2000);
  await waitMs(homeDur);
  clearInterval(homeTimer);
  if (skipCeremony) { overlay.removeChild(skipBtn); overlay.style.display='none'; onComplete(); return; }

  // Away anthem
  $('pmHomeName').textContent = '';
  $('pmAwayName').textContent = awayName + (TEAM_NICKNAMES[awayName] ? ` — ${TEAM_NICKNAMES[awayName]}` : '');
  $('pmHomeAnecdote').textContent = '';
  $('pmAwayAnecdote').textContent = awayAnthemName ? `♪ ${awayAnthemName} ♪` : '♪ National Anthem ♪';
  $('pmTimer').textContent = '10';

  let t2=10;
  const awayTimer = setInterval(()=>{ t2--; if ($('pmTimer')) $('pmTimer').textContent=Math.max(0,t2); if(t2<=0)clearInterval(awayTimer); }, 1000);
  const awayDur = await playAnthemMidi(awaySlug, 10).catch(()=>2000);
  await waitMs(awayDur);
  clearInterval(awayTimer);

  // Brief anecdote pause
  $('pmHomeName').textContent = homeName;
  $('pmAwayName').textContent = awayName;
  $('pmHomeAnecdote').textContent = getTeamAnecdote(homeName);
  $('pmAwayAnecdote').textContent = getTeamAnecdote(awayName);
  $('pmTimer').textContent = '3';
  await waitMs(3000);

  overlay.removeChild(skipBtn);
  overlay.style.display = 'none';
  onComplete();
}

function narrativeStat(value, templates) {
  if (!value) return '';
  const t = templates[Math.min(value - 1, templates.length - 1)];
  return `<div class="rs-stat">${t.replace('{n}', value)}</div>`;
}
