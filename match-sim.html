// ---- DATA LOADING ----
async function loadTeamData(teamName) {
  const meta = TEAM_META[teamName];
  if (!meta) return { roster: null, country: null, slug: meta?.slug };
  const slug = meta.slug;
  let roster = null, country = null;
  try {
    const r = await fetch(`assets/teams/${slug}/roster.json`);
    if (r.ok) roster = await r.json();
  } catch(e) {}
  try {
    const r = await fetch(`assets/teams/${slug}/country.json`);
    if (r.ok) country = await r.json();
  } catch(e) {}
  return { roster, country, slug, meta };
}

function inferFormation(roster) {
  const players = roster?.players || roster || [];
  if (!players.length) return { formation: '4-3-3', starters: [], subs: [] };
  const sorted = [...players].sort((a, b) => {
    if (a.captain && !b.captain) return -1;
    if (!a.captain && b.captain) return 1;
    return (b.caps || 0) - (a.caps || 0);
  });
  const counts = { GK: 0, DF: 0, MF: 0, FW: 0 };
  players.forEach(p => { if (counts[p.position] !== undefined) counts[p.position]++; });
  const totalOutfield = counts.DF + counts.MF + counts.FW;
  const dfRatio = counts.DF / totalOutfield;
  const fwRatio = counts.FW / totalOutfield;
  const mfRatio = counts.MF / totalOutfield;
  let formation, dfCount, mfCount, fwCount;
  if (dfRatio >= 0.38 && fwRatio <= 0.22) {
    if (counts.DF >= 7) { formation="5-3-2"; dfCount=5; mfCount=3; fwCount=2; }
    else { formation="4-4-2"; dfCount=4; mfCount=4; fwCount=2; }
  } else if (mfRatio >= 0.40 && fwRatio <= 0.25) {
    if (counts.DF <= 7) { formation="3-5-2"; dfCount=3; mfCount=5; fwCount=2; }
    else { formation="4-2-3-1"; dfCount=4; mfCount=5; fwCount=1; }
  } else if (fwRatio >= 0.28) {
    if (counts.DF <= 7) { formation="3-4-3"; dfCount=3; mfCount=4; fwCount=3; }
    else { formation="4-3-3"; dfCount=4; mfCount=3; fwCount=3; }
  } else {
    formation="4-3-3"; dfCount=4; mfCount=3; fwCount=3;
  }
  const targets = { GK: 1, DF: dfCount, MF: mfCount, FW: fwCount };
  const starters = [], subs = [];
  const posStarters = { GK: 0, DF: 0, MF: 0, FW: 0 };
  for (const player of sorted) {
    const pos = player.position;
    if (posStarters[pos] < (targets[pos] || 0)) { starters.push(player); posStarters[pos]++; }
    else subs.push(player);
  }
  for (const player of sorted) {
    if (starters.length >= 11) break;
    if (!starters.includes(player)) { starters.push(player); const idx = subs.indexOf(player); if (idx > -1) subs.splice(idx, 1); }
  }
  const posOrder = { GK: 0, DF: 1, MF: 2, FW: 3 };
  starters.sort((a, b) => (posOrder[a.position] || 2) - (posOrder[b.position] || 2));
  return { formation, starters: starters.slice(0, 11), subs };
}

function lastName(name) {
  if (!name) return '???';
  const parts = name.split(' ');
  return parts[parts.length - 1];
}

// ---- PLAYER SPRITE CREATION ----
function createPlayers(teamData, teamName, side) {
  // side: 0=home (attacks up/top), 1=away (attacks down/bottom)
  const form = inferFormation(teamData?.roster);
  const coords = FORMATION_POSITIONS[form.formation] || FORMATION_POSITIONS["4-3-3"];
  const colors = TEAM_COLORS[teamName] || ['#fff', '#888'];
  const slug = TEAM_META[teamName]?.slug || '';
  const players = [];

  for (let i = 0; i < 11; i++) {
    const pd = form.starters[i] || { number: i + 1, position: i === 0 ? 'GK' : 'FW', name: `Player ${i+1}`, captain: false };
    // Formation coords: x=0-100 (left-right), y=0-100 (top=attacking end, bottom=own goal)
    let fx = coords[i] ? coords[i][0] : 50;
    let fy = coords[i] ? coords[i][1] : 50;

    // Convert percentage to pitch pixels
    // side 0 (home): attacks toward PITCH_T (top), own goal at PITCH_B (bottom)
    //   so y=92 (GK near own goal) maps to near PITCH_B, y=18 (striker) maps to near PITCH_T
    // side 1 (away): mirror — attacks toward PITCH_B, own goal at PITCH_T
    let px, py;
    if (side === 0) {
      px = PITCH_L + (fx / 100) * PW;
      py = PITCH_T + (fy / 100) * PH;
    } else {
      px = PITCH_L + ((100 - fx) / 100) * PW;
      py = PITCH_T + ((100 - fy) / 100) * PH;
    }

    const img = new Image();
    img.src = `assets/teams/${slug}/players/${pd.number}.png`;
    let imgLoaded = false;
    img.onload = () => { imgLoaded = true; };
    img.onerror = () => { imgLoaded = false; };

    players.push({
      x: px, y: py,
      homeX: px, homeY: py,
      vx: 0, vy: 0,
      number: pd.number,
      name: pd.name,
      lastName: lastName(pd.name),
      position: pd.position,
      captain: pd.captain || false,
      team: side,
      teamName: teamName,
      slug: slug,
      awayColor: side === 1 ? (colors[0] || '#e05cd9') : null,
      shirtColor: side === 0 ? colors[0] : colors[1],
      shortsColor: side === 0 ? colors[1] : colors[0],
      img, imgLoaded: () => imgLoaded,
      state: 'idle', // idle | chasing | hasBall | celebrating | dejected | fighting | diving | sentOff
      caps: pd.caps || 0,
      speed: pd.position === 'GK' ? GK_SPEED : playerSpeed(pd.caps || 0),
      stateTimer: 0,
      goals: 0,
      sentOff: false,
      diveAngle: 0,
      slideX: 0, slideY: 0,
    });
  }
  return players;
}

// Offscreen canvas sprite cache — pre-renders circular mugshot clips for performance
const playerSpriteCache = new Map(); // key: "slug/number", value: OffscreenCanvas or HTMLCanvasElement

function buildSpriteCache(slug, players, images) {
  for (const player of players) {
    const key = `${slug}/${player.number}`;
    const size = 40; // head diameter (matches hr=20 in drawPlayer)
    // Use OffscreenCanvas if available, fallback to createElement
    const oc = typeof OffscreenCanvas !== 'undefined'
      ? new OffscreenCanvas(size, size)
      : Object.assign(document.createElement('canvas'), {width: size, height: size});
    const octx = oc.getContext('2d');
    octx.beginPath();
    octx.arc(size/2, size/2, size/2, 0, Math.PI*2);
    octx.clip();
    const img = images[player.number];
    if (img && img.complete && img.naturalWidth > 0) {
      octx.drawImage(img, 0, 0, size, size);
    } else {
      // Fallback: coloured circle with number
      octx.fillStyle = player.teamColor || '#888';
      octx.fill();
      octx.fillStyle = '#fff';
      octx.font = `bold ${Math.floor(size*0.4)}px monospace`;
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';
      octx.fillText(String(player.number), size/2, size/2);
    }
    playerSpriteCache.set(key, oc);
  }
}

// ---- PITCH DRAWING ----
function drawPitch(ctx) {
  const px = PITCH_L, py = PITCH_T, pw = PW, ph = PH;
  const m = PITCH_M; // pixels per metre

  // --- Background (beyond touchlines) ---
  ctx.fillStyle = '#1e5c32';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // --- Mowing stripes (horizontal bands, Sensible Soccer style) ---
  const stripeCount = 18;
  const stripeH = ph / stripeCount;
  const greens = ['#2a7a42', '#2d8c4e', '#31985a'];
  for (let i = 0; i < stripeCount; i++) {
    ctx.fillStyle = greens[i % 2 === 0 ? 0 : (i % 4 === 1 ? 1 : 2)];
    ctx.fillRect(px, py + i * stripeH, pw, stripeH + 1); // +1 prevents sub-pixel gaps
  }

  // Subtle vignette edges (darker border strips)
  ctx.fillStyle = '#1e5c32';
  ctx.fillRect(px, py, pw, 4);
  ctx.fillRect(px, py + ph - 4, pw, 4);
  ctx.fillRect(px, py, 4, ph);
  ctx.fillRect(px + pw - 4, py, 4, ph);

  // --- Pitch outline (touchlines) ---
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeRect(px, py, pw, ph);

  // --- Halfway line ---
  const midY = py + ph / 2;
  ctx.beginPath();
  ctx.moveTo(px, midY);
  ctx.lineTo(px + pw, midY);
  ctx.stroke();

  // --- Center circle ---
  ctx.beginPath();
  ctx.arc(px + pw / 2, midY, 100, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();

  // --- Center spot ---
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(px + pw / 2, midY, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // --- Penalty boxes (16.5m deep × 40.32m wide) ---
  const pbW = 40.32 * m;
  const pbH = 16.5 * m;
  const pbX = px + (pw - pbW) / 2;
  ctx.strokeRect(pbX, py, pbW, pbH);
  ctx.strokeRect(pbX, py + ph - pbH, pbW, pbH);

  // --- 6-yard boxes (5.5m deep × 18.32m wide) ---
  const gbW = 18.32 * m;
  const gbH = 5.5 * m;
  const gbX = px + (pw - gbW) / 2;
  ctx.strokeRect(gbX, py, gbW, gbH);
  ctx.strokeRect(gbX, py + ph - gbH, gbW, gbH);

  // --- Penalty spots (11m from goal line) ---
  const pspY = 11 * m;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(px + pw / 2, py + pspY, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + pw / 2, py + ph - pspY, 2, 0, Math.PI * 2); ctx.fill();

  // --- Penalty arcs (D) ---
  // Arc outside the penalty box, centred on penalty spot, radius = 9.15m
  const arcR = 9.15 * m;
  // Top penalty arc: arc below the penalty box top edge
  ctx.beginPath();
  ctx.arc(px + pw / 2, py + pspY, arcR, 0.6, Math.PI - 0.6);
  ctx.stroke();
  // Bottom penalty arc: arc above the penalty box bottom edge
  ctx.beginPath();
  ctx.arc(px + pw / 2, py + ph - pspY, arcR, Math.PI + 0.6, -0.6);
  ctx.stroke();

  // --- Corner arcs (1m radius) ---
  const cr = 1 * m;
  ctx.beginPath(); ctx.arc(px, py, cr, 0, Math.PI / 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px + pw, py, cr, Math.PI / 2, Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(px, py + ph, cr, -Math.PI / 2, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(px + pw, py + ph, cr, Math.PI, Math.PI * 1.5); ctx.stroke();

  // --- Goals ---
  const goalW = GOAL_W;
  const goalD = GOAL_H;
  const goalX = GOAL_L;

  // Top goal (home attacks here → away's goal)
  ctx.fillStyle = '#1a3a28';
  ctx.fillRect(goalX, GOAL_TOP_Y, goalW, goalD);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(goalX, GOAL_TOP_Y, goalW, goalD);

  // Bottom goal (away attacks here → home's goal)
  ctx.fillStyle = '#1a3a28';
  ctx.fillRect(goalX, GOAL_BOT_Y, goalW, goalD);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(goalX, GOAL_BOT_Y, goalW, goalD);

  // Netting: crosshatch pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.5;
  const netSpacing = goalD / 3;
  // Horizontal net lines
  for (let n = 0; n < 3; n++) {
    const hy = n * netSpacing;
    ctx.beginPath(); ctx.moveTo(goalX, GOAL_TOP_Y + hy); ctx.lineTo(goalX + goalW, GOAL_TOP_Y + hy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(goalX, GOAL_BOT_Y + hy); ctx.lineTo(goalX + goalW, GOAL_BOT_Y + hy); ctx.stroke();
  }
  // Vertical net lines
  const vNetCount = Math.floor(goalW / netSpacing);
  for (let v = 0; v <= vNetCount; v++) {
    const nx = goalX + v * netSpacing;
    ctx.beginPath(); ctx.moveTo(nx, GOAL_TOP_Y); ctx.lineTo(nx, PITCH_T); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(nx, GOAL_BOT_Y); ctx.lineTo(nx, GOAL_BOT_Y + goalD); ctx.stroke();
  }

  // Reset line style
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
}

// ---- DRAW PLAYER (Sensible Soccer style: oversized head on tiny body) ----
function drawPlayer(ctx, p, frameTime = Date.now()) {
  if (p.sentOff) return;

  let x = p.x + (p.slideX || 0);
  let y = p.y + (p.slideY || 0);
  const isMoving = Math.abs(p.vx) > 0.3 || Math.abs(p.vy) > 0.3;
  const frame = Math.floor(frameTime / 120) % 2; // 2-frame walk cycle ~8fps
  const hasBall = ball.owner === p;

  // Dramatic states: rotate player horizontal + jiggle
  const isDramatic = p.state === 'diving' || p.state === 'fighting' || p.state === 'celebrating' || p.state === 'slacking' || p.state === 'dejected';
  if (isDramatic) {
    ctx.save();
    ctx.translate(x, y);
    if (p.state === 'diving') {
      ctx.rotate(Math.PI / 2 + Math.sin(p.stateTimer * 0.4) * 0.3); // on their side, writhing
    } else if (p.state === 'fighting') {
      ctx.rotate(Math.sin(frameTime / 80) * 0.5); // jiggling aggressively
      ctx.translate(Math.sin(frameTime / 50) * 4, Math.cos(frameTime / 60) * 3); // shaking
    } else if (p.state === 'celebrating') {
      // Varied celebration rotations based on type
      if (p.celebrationType === 'kneeSlide') {
        ctx.rotate(0.3); // slight lean forward
        ctx.translate((p.celebSlideX || 0), 4); // sliding forward + lower
      } else if (p.celebrationType === 'cornerFlag' && p.celebPhase > 30) {
        ctx.rotate(Math.sin(frameTime / 100) * 0.8); // wild dance at corner
      } else if (p.celebrationType === 'shirtPull') {
        ctx.translate(0, -3); // shirt over head lifts body
      } else {
        ctx.rotate(Math.sin(frameTime / 200) * 0.4); // default sway
      }
    } else if (p.state === 'dejected') {
      if (p.dejectionType === 'dropToKnees') {
        ctx.translate(0, 6); // sink down
        ctx.rotate(0.15); // slight forward lean
      } else if (p.dejectionType === 'stareAtGround') {
        ctx.rotate(0.2); // head down
      } else if (p.dejectionType === 'argueWithRef') {
        ctx.rotate(Math.sin(frameTime / 60) * 0.15); // agitated
      }
      // handsOnHead: no rotation, just the overlaid visual
    } else if (p.state === 'slacking') {
      ctx.rotate(Math.PI / 2); // lying down
    }
    x = 0; y = 0; // relative to translated origin
  }

  // --- Shadow ---
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x, y + 3, isDramatic ? 14 : 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // --- Body (tiny rectangle) ---
  // Kit colours: GK gets team-specific bright colour, outfield uses TEAM_COLORS
  let shirtCol, shortsCol;
  if (p.position === 'GK') {
    shirtCol = p.team === 0 ? '#ccdd22' : '#ff7700';
    shortsCol = p.team === 0 ? '#889900' : '#bb4400';
  } else if (p.team === 0) {
    const cols = (typeof TEAM_COLORS !== 'undefined' && p.teamName && TEAM_COLORS[p.teamName]) ? TEAM_COLORS[p.teamName] : ['#f2f4ec','#1a3a6a'];
    shirtCol = cols[0] || '#f2f4ec';
    shortsCol = cols[1] || '#1a3a6a';
  } else {
    const cols = (typeof TEAM_COLORS !== 'undefined' && p.teamName && TEAM_COLORS[p.teamName]) ? TEAM_COLORS[p.teamName] : ['#e05cd9','#330033'];
    shirtCol = cols[1] || '#e05cd9';
    shortsCol = cols[0] || '#220022';
  }
  const kitColor = shirtCol; // keep kitColor for backwards compat
  const bw = 6, bh = 8;
  const legShift = isMoving ? (frame === 0 ? 1 : -1) : 0;
  ctx.fillStyle = shirtCol;
  ctx.fillRect(x - bw / 2, y - bh / 2 + legShift, bw, bh);

  // --- Shorts: darker lower half of body ---
  ctx.fillStyle = shortsCol;
  ctx.fillRect(x - bw / 2, y, bw, bh / 2 + legShift);

  // --- Socks: 2px stripe at bottom ---
  ctx.fillStyle = shirtCol;
  ctx.fillRect(x - bw / 2, y + bh / 2 - 1, bw, 2);

  // --- Captain armband: gold stripe ---
  if (p.captain) {
    ctx.fillStyle = '#f0c44c';
    ctx.fillRect(x + bw / 2 - 2, y - bh / 2 + 1, 2, 3);
  }

  // --- Head: circular mugshot (comically oversized) ---
  const hr = PLAYER_HEAD_R; // head radius — 40px diameter, comically oversized
  const headY = y - bh / 2 - hr + 1; // sits just above body
  const cacheKey = `${p.slug}/${p.number}`;
  const cachedHead = playerSpriteCache.get(cacheKey);

  if (cachedHead) {
    ctx.drawImage(cachedHead, x - hr, headY - hr, hr * 2, hr * 2);
  } else {
    // Fallback: coloured circle with number
    ctx.fillStyle = kitColor;
    ctx.beginPath();
    ctx.arc(x, headY, hr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(p.number), x, headY);
  }

  // Head outline ring (team primary colour, thicker for visibility at 40px)
  ctx.strokeStyle = shirtCol;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, headY, hr, 0, Math.PI * 2);
  ctx.stroke();
  // Dark definition ring
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, headY, hr + 1, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1;

  // --- Facing indicator: tiny triangle below body ---
  if (isMoving) {
    const angle = Math.atan2(p.vy, p.vx);
    const tSize = 3;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.save();
    ctx.translate(x, y + bh / 2 + 3);
    ctx.rotate(angle - Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, -tSize);
    ctx.lineTo(-tSize / 2, tSize / 2);
    ctx.lineTo(tSize / 2, tSize / 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // --- Name label (surname, hovering above head — bold with outline for readability) ---
  const surname = p.lastName || (p.name||'?').split(' ').pop();
  ctx.font = 'bold 9px "Space Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  const nameY = headY - hr - 4;
  // Dark stroke outline for contrast
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 2.5;
  ctx.strokeText(surname, x, nameY);
  ctx.fillStyle = '#fff';
  ctx.fillText(surname, x, nameY);
  ctx.lineWidth = 1;
  // Shirt number on body
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.font = 'bold 6px monospace';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(p.number), x, y - 1);

  // Ball at feet removed — the actual ball tracks the owner in updateBall()

  // --- Diving effect ---
  if (p.state === 'diving') {
    const t = p.stateTimer;
    for (let s = 0; s < 3; s++) {
      const sAngle = (t * 0.1 + s * 2.1);
      const sx = x + Math.cos(sAngle) * 16;
      const sy = headY + Math.sin(sAngle) * 12 - 8;
      ctx.fillStyle = '#f0c44c';
      ctx.font = '10px serif';
      ctx.textAlign = 'center';
      ctx.fillText('\u2605', sx, sy);
    }
  }

  // --- Fighting effect: big cartoon boxing gloves ---
  if (p.state === 'fighting') {
    const punchT = frameTime / 120;
    const leftPunch = Math.sin(punchT) * 0.5 + 0.5;
    const rightPunch = Math.sin(punchT + Math.PI) * 0.5 + 0.5;
    const fistR = 10;

    // Left fist
    const lfExtend = 12 + leftPunch * 14;
    const lfx = x - lfExtend;
    const lfy = y - 2 + leftPunch * -6;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x - 3, y); ctx.lineTo(lfx, lfy); ctx.stroke();
    ctx.fillStyle = '#cc2222';
    ctx.beginPath(); ctx.arc(lfx, lfy, fistR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#881111'; ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.strokeStyle = '#991111'; ctx.lineWidth = 1;
    for (let k = -1; k <= 1; k++) {
      ctx.beginPath();
      ctx.moveTo(lfx + k * 3.5, lfy - 3);
      ctx.lineTo(lfx + k * 3.5, lfy + 3);
      ctx.stroke();
    }

    // Right fist (opposite phase)
    const rfExtend = 12 + rightPunch * 14;
    const rfx = x + rfExtend;
    const rfy = y - 2 + rightPunch * -6;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x + 3, y); ctx.lineTo(rfx, rfy); ctx.stroke();
    ctx.fillStyle = '#cc2222';
    ctx.beginPath(); ctx.arc(rfx, rfy, fistR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#881111'; ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.strokeStyle = '#991111'; ctx.lineWidth = 1;
    for (let k = -1; k <= 1; k++) {
      ctx.beginPath();
      ctx.moveTo(rfx + k * 3.5, rfy - 3);
      ctx.lineTo(rfx + k * 3.5, rfy + 3);
      ctx.stroke();
    }

    // Impact starburst when fist fully extended
    if (leftPunch > 0.9) {
      ctx.fillStyle = 'rgba(255,200,0,0.8)';
      ctx.beginPath();
      for (let s = 0; s < 8; s++) {
        const angle = (s / 8) * Math.PI * 2 + frameTime / 200;
        const r = s % 2 === 0 ? 8 : 4;
        ctx[s === 0 ? 'moveTo' : 'lineTo'](lfx - 6 + Math.cos(angle) * r, lfy + Math.sin(angle) * r);
      }
      ctx.closePath(); ctx.fill();
    }
    if (rightPunch > 0.9) {
      ctx.fillStyle = 'rgba(255,200,0,0.8)';
      ctx.beginPath();
      for (let s = 0; s < 8; s++) {
        const angle = (s / 8) * Math.PI * 2 + frameTime / 200;
        const r = s % 2 === 0 ? 8 : 4;
        ctx[s === 0 ? 'moveTo' : 'lineTo'](rfx + 6 + Math.cos(angle) * r, rfy + Math.sin(angle) * r);
      }
      ctx.closePath(); ctx.fill();
    }
    ctx.lineWidth = 1;
  }

  // --- Celebration type visuals ---
  if (p.state === 'celebrating' && p.celebrationType) {
    if (p.celebrationType === 'kneeSlide') {
      // Dust trail behind knee slide
      if (p.celebPhase < 40 && p.celebPhase % 5 === 0) {
        addEffect('dust', p.x - 10, p.y + 4, {dir: -1});
      }
    } else if (p.celebrationType === 'armsUp') {
      // Two lines extending upward from shoulders (raised arms)
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 2;
      const armWave = Math.sin(frameTime / 150) * 3;
      ctx.beginPath(); ctx.moveTo(x - 3, y - bh/2); ctx.lineTo(x - 6 + armWave, y - bh - 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 3, y - bh/2); ctx.lineTo(x + 6 - armWave, y - bh - 8); ctx.stroke();
      ctx.lineWidth = 1;
    } else if (p.celebrationType === 'shirtPull') {
      // Shirt over head: upper body becomes skin tone
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(x - bw/2, y - bh/2, bw, bh/2);
    } else if (p.celebrationType === 'pileOn' && p.celebPhase > 20) {
      // Extra jiggle on pile-on
      ctx.fillStyle = 'rgba(240,196,76,0.3)';
      ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.fill();
    }
  }

  // --- Dejection type visuals ---
  if (p.state === 'dejected' && p.dejectionType) {
    if (p.dejectionType === 'handsOnHead') {
      // Two small circles above head (hands)
      const headY2 = y - bh/2 - PLAYER_HEAD_R + 1;
      ctx.fillStyle = '#d4a574';
      ctx.beginPath(); ctx.arc(x - 8, headY2 - PLAYER_HEAD_R - 2, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 8, headY2 - PLAYER_HEAD_R - 2, 4, 0, Math.PI * 2); ctx.fill();
      // Arm lines
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x - 3, y - bh/2); ctx.lineTo(x - 8, headY2 - PLAYER_HEAD_R - 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 3, y - bh/2); ctx.lineTo(x + 8, headY2 - PLAYER_HEAD_R - 2); ctx.stroke();
      ctx.lineWidth = 1;
    } else if (p.dejectionType === 'dropToKnees') {
      // Draw body shorter (already translated down via isDramatic)
      ctx.globalAlpha = 0.85;
    } else if (p.dejectionType === 'argueWithRef') {
      // Arm lines flailing
      const wave = Math.sin(frameTime / 80) * 8;
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x - 3, y); ctx.lineTo(x - 12 + wave, y - 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 3, y); ctx.lineTo(x + 12 - wave, y - 10); ctx.stroke();
      ctx.lineWidth = 1;
    }
    // Subtle grey overlay for dejection
    if (p.dejectionType !== 'argueWithRef') {
      ctx.globalAlpha = 0.85;
    }
  }

  // Slacking — idle comedy antic when camera zooms via minimap
  if (p.state === 'slacking' && p.slackEmoji) {
    // Sit/lie down: shift body down
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.slackEmoji, x + 14, y - 4);
    // Label below
    ctx.fillStyle = 'rgba(240,196,76,0.8)';
    ctx.font = '7px "Space Mono", monospace';
    ctx.fillText(p.slackLabel || '', x, y + bh/2 + 18);
  }

  // Close dramatic rotation transform
  if (isDramatic) {
    ctx.restore();
  }
}

// ---- DRAW BALL ----
function drawReferee(ctx) {
  // Track ball, offset to side; during fight: sprint to cluster
  ref.targetX = ref.inFight ? ref.fightX : ball.x + 75;
  ref.targetY = ref.inFight ? ref.fightY : ball.y - 25;
  ref.x += (ref.targetX - ref.x) * (ref.inFight ? 0.18 : 0.03);
  ref.y += (ref.targetY - ref.y) * (ref.inFight ? 0.18 : 0.03);
  ref.x = Math.max(PITCH_L+5, Math.min(PITCH_R-5, ref.x));
  ref.y = Math.max(PITCH_T+5, Math.min(PITCH_B-5, ref.y));
  const rx = ref.x, ry = ref.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(rx, ry+3, 6, 2.5, 0, 0, Math.PI*2); ctx.fill();
  // Black body with yellow stripe
  ctx.fillStyle = '#111827';
  ctx.fillRect(rx-3, ry-4, 6, 9);
  ctx.fillStyle = '#f0c44c';
  ctx.fillRect(rx-3, ry+1, 6, 2);
  // Head
  ctx.fillStyle = '#ddb896';
  ctx.beginPath(); ctx.arc(rx, ry-7, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 0.5; ctx.stroke(); ctx.lineWidth = 1;
  // Show yellow card during fight
  if (ref.inFight && Math.random() < 0.08) {
    ctx.fillStyle = '#f0c44c';
    ctx.fillRect(rx+5, ry-12, 6, 8);
  }
}

// Draw special event icons as pixel art — no emoji dependency
function drawSpecialIcon(ctx, iconKey, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  const s = size / 80; // normalize to 80px base

  // Draw a retro-style icon based on the first character of the icon key
  // Since emojis may not render, draw geometric/symbolic pixel art
  ctx.fillStyle = '#f0c44c';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2 * s;

  // Large bold symbol — works on all browsers
  const symbols = {
    '✋':'✋ HAND', '7️':'7-1', '🏠':'HOME?', '⚙':'MACHINE', '🤕':'HEADBUTT',
    '🤌':'DEFENCE', '🔄':'PASS×999', '🟠':'TOTAL', '😤':'SIUUU', '🌮':'NO PENAL',
    '🦅':'FREEDOM', '🗾':'SAMURAI', '🇰':'2002?!', '🦘':'BOUNCE', '🖤':'HAKA',
    '📯':'BZZZZ', '🏴':'SCOTLAND', '🦁':'LION', '⭐':'STARS', '☕':'COFFEE',
    '🦷':'BITE!', '🔥':'FIRE', '🍟':'GOLDEN', '🧀':'PRECISE', '🌙':'CRESCENT',
    '🏛':'ANCIENT', '🏟':'PROTEST', '🏗':'$$$', '🍁':'HOCKEY?', '📜':'5000YRS',
    '🏜':'ROYAL', '🦈':'SHARK', '🏝':'ISLAND', '🥊':'BOOM', '🚢':'CANAL',
    '🔴':'FURY', '🌋':'ERUPTION', '🧊':'VIKING', '👑':'ABBA', '🎵':'MUSIC',
    '🍺':'CZECH', '🦊':'FENNEC', '🐺':'WOLF', '🐉':'DRAGON', '🐆':'LEOPARD',
    '🐘':'ELEPHANT',
  };
  
  // Find matching symbol text from icon key
  let label = 'EVENT';
  for (const [emoji, text] of Object.entries(symbols)) {
    if (iconKey.includes(emoji.charAt(0)) || iconKey.includes(emoji)) { label = text; break; }
  }

  // Draw large retro block text instead of emoji
  ctx.fillStyle = '#f0c44c';
  ctx.font = `bold ${48 * s}px "Anton", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Pixelated outline effect
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 4 * s;
  ctx.strokeText(label, 0, 0);
  ctx.fillText(label, 0, 0);

  // Decorative corner brackets
  const bsz = 30 * s;
  ctx.strokeStyle = '#f0c44c';
  ctx.lineWidth = 3 * s;
  // Top-left
  ctx.beginPath(); ctx.moveTo(-bsz*2, -bsz); ctx.lineTo(-bsz*2, -bsz*1.5); ctx.lineTo(-bsz*1.5, -bsz*1.5); ctx.stroke();
  // Top-right
  ctx.beginPath(); ctx.moveTo(bsz*2, -bsz); ctx.lineTo(bsz*2, -bsz*1.5); ctx.lineTo(bsz*1.5, -bsz*1.5); ctx.stroke();
  // Bottom-left
  ctx.beginPath(); ctx.moveTo(-bsz*2, bsz); ctx.lineTo(-bsz*2, bsz*1.5); ctx.lineTo(-bsz*1.5, bsz*1.5); ctx.stroke();
  // Bottom-right
  ctx.beginPath(); ctx.moveTo(bsz*2, bsz); ctx.lineTo(bsz*2, bsz*1.5); ctx.lineTo(bsz*1.5, bsz*1.5); ctx.stroke();
  ctx.lineWidth = 1;

  ctx.restore();
}

// Draw possession arrow showing ball carrier's direction + passing lanes
function drawPossessionArrow(ctx) {
  if (!ball.owner) return;
  const p = ball.owner;
  const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
  if (spd < 0.5) return;

  const dir = Math.atan2(p.vy, p.vx);
  const arrowLen = 30 + spd * 8; // longer arrow at higher speed
  const tipX = ball.x + Math.cos(dir) * arrowLen;
  const tipY = ball.y + Math.sin(dir) * arrowLen;

  // Arrow shaft with team colour
  const col = p.team === 0 ? 'rgba(255,255,255,0.5)' : 'rgba(240,196,76,0.5)';
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  ctx.fillStyle = col;
  ctx.beginPath();
  const headSize = 6;
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - Math.cos(dir - 0.4) * headSize, tipY - Math.sin(dir - 0.4) * headSize);
  ctx.lineTo(tipX - Math.cos(dir + 0.4) * headSize, tipY - Math.sin(dir + 0.4) * headSize);
  ctx.closePath();
  ctx.fill();
  ctx.lineWidth = 1;
}

function drawBall(ctx, frameTime = Date.now()) {
  const bx = ball.x, by = ball.y;
  const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  // Ball grows when kicked hard — simulates "coming toward camera" effect
  const br = BALL_R + Math.min(speed * 0.3, 4); // up to +4px at max speed

  // Velocity blur trail — ghosted copies behind the ball
  if (speed > 2) {
    const trailCount = Math.min(Math.floor(speed / 2), 5);
    const nx = -ball.vx / (speed||1), ny = -ball.vy / (speed||1); // opposite direction
    for (let i = 1; i <= trailCount; i++) {
      const alpha = 0.15 - (i * 0.025);
      const tx = bx + nx * i * (br * 0.8);
      const ty = by + ny * i * (br * 0.8);
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0.02, alpha)})`;
      ctx.beginPath();
      ctx.arc(tx, ty, br * (1 - i*0.1), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Shadow (stretches with speed)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  const shadowStretch = Math.min(speed * 0.3, 4);
  ctx.ellipse(bx + 2, by + 3, br + 2 + shadowStretch, br - 1, 0, 0, Math.PI * 2);
  ctx.fill();

  // White base
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  ctx.fill();

  // Classic dodecahedron pentagon pattern (5 dark patches)
  ctx.fillStyle = '#222';
  const spin = (frameTime / 300) * (Math.abs(ball.vx) + Math.abs(ball.vy)) * 0.05;
  for (let i = 0; i < 5; i++) {
    const angle = spin + (i / 5) * Math.PI * 2;
    const px = bx + Math.cos(angle) * br * 0.52;
    const py = by + Math.sin(angle) * br * 0.52;
    ctx.beginPath();
    // Small pentagon approximated as circle
    ctx.arc(px, py, br * 0.28, 0, Math.PI * 2);
    ctx.fill();
  }
  // Center pentagon
  ctx.beginPath();
  ctx.arc(bx, by, br * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(bx, by, br, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1;

  // Seam lines (connecting pentagons)
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 5; i++) {
    const a1 = spin + (i / 5) * Math.PI * 2;
    const a2 = spin + ((i + 1) % 5 / 5) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(bx + Math.cos(a1) * br * 0.52, by + Math.sin(a1) * br * 0.52);
    ctx.lineTo(bx + Math.cos(a2) * br * 0.52, by + Math.sin(a2) * br * 0.52);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
}

// ---- DRAW VAR OVERLAY ----
function drawVAR(ctx) {
  if (!varActive) return;
  // Dotted rectangle
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#b06cf2';
  ctx.lineWidth = 2;
  ctx.strokeRect(CW / 2 - 100, CH / 2 - 60, 200, 120);
  ctx.setLineDash([]);

  // Text
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(CW / 2 - 100, CH / 2 - 60, 200, 120);

  ctx.fillStyle = '#b06cf2';
  ctx.font = "bold 18px 'Anton', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (varTimer > 90) {
    ctx.fillText('VAR REVIEWING...', CW / 2, CH / 2 - 10);
    ctx.font = "14px 'Space Mono', monospace";
    ctx.fillStyle = '#fff';
    ctx.fillText('🖥️ checking the monitor', CW / 2, CH / 2 + 16);
  } else {
    ctx.fillStyle = varResult === 'PENALTY!' ? '#f25c5c' : '#4dc97b';
    ctx.fillText(varResult, CW / 2, CH / 2);
  }
}

// ---- DRAW PITCH INVADER ----
function drawPitchInvader(ctx) {
  if (!pitchInvader) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath();
  ctx.arc(pitchInvader.x, pitchInvader.y - 6, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(pitchInvader.x - 3, pitchInvader.y, 6, 10);
  // Steward chasing
  if (pitchInvader.steward) {
    ctx.fillStyle = '#f0c44c';
    ctx.beginPath();
    ctx.arc(pitchInvader.steward.x, pitchInvader.steward.y - 6, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(pitchInvader.steward.x - 3, pitchInvader.steward.y, 6, 10);
  }
}

// ---- BALL PHYSICS ----
function updateBall() {
  if (ball.owner) {
    // Ball dribbles at player's feet — jiggle side-to-side + ahead/behind
    const p = ball.owner;
    const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    const dir = Math.atan2(p.vy || 0.01, p.vx || 0);
    const t = Date.now() / 150;
    // Dribble offset: ball moves in small figure-8 pattern at feet
    const dribbleX = Math.sin(t * 2.5) * (4 + spd * 0.8);
    const dribbleY = Math.cos(t * 1.7) * (3 + spd * 0.5);
    // Position ahead of player in movement direction
    const aheadDist = 10 + spd * 1.5;
    ball.x = p.x + Math.cos(dir) * aheadDist + dribbleX;
    ball.y = p.y + Math.sin(dir) * aheadDist + dribbleY;
    // Store velocity for blur rendering even when possessed
    ball.vx = p.vx * 0.8 + dribbleX * 0.3;
    ball.vy = p.vy * 0.8 + dribbleY * 0.3;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;

  // Clamp tiny velocities
  if (Math.abs(ball.vx) < 0.1) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.1) ball.vy = 0;

  // Side boundaries → throw-in
  if (ball.x < PITCH_L || ball.x > PITCH_R) {
    const side = ball.x < PITCH_L ? 'left' : 'right';
    const throwX = side === 'left' ? PITCH_L + 5 : PITCH_R - 5;
    const throwY = ball.y;
    ball.x = throwX; ball.y = throwY;
    ball.vx = 0; ball.vy = 0;
    ball.free = true; ball.owner = null;

    // Award to team that DIDN'T touch it last
    const throwingTeam = (ball.lastTouchedBy && ball.lastTouchedBy.team === 0) ? 1 : 0;
    const throwers = (throwingTeam === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff);
    const thrower = throwers.sort((a,b) => dist(a.x,a.y,throwX,throwY) - dist(b.x,b.y,throwX,throwY))[0];
    const tName = throwingTeam === 0 ? homeTeamName : awayTeamName;
    if (Math.random() < 0.3) addCommentary('default', `Throw-in for ${tName}. ${thrower?.lastName || 'Someone'} to deliver.`);

    if (thrower) {
      thrower.x = throwX + (side === 'left' ? -8 : 8);
      thrower.y = throwY;
      // Throw the ball infield after 0.5s
      setTimeout(() => {
        if (ball.free && dist(ball.x, ball.y, throwX, throwY) < 30) {
          const infield = side === 'left' ? 1 : -1;
          ball.vx = infield * (4 + Math.random() * 3);
          ball.vy = (Math.random() - 0.5) * 6;
          ball.lastTouchedBy = thrower;
          AudioManager.playKick();
        }
      }, 500);
    }
    return; // skip further boundary checks this frame
  }

  // End boundaries — check for goal or corner/goal-kick
  if (ball.y < PITCH_T) {
    if (ball.x > GOAL_L && ball.x < GOAL_R) {
      scoreGoal(0); return;
    }
    // Missed — corner or goal kick
    const lastTeam = ball.lastTouchedBy?.team;
    // home attacks toward PITCH_T (team 0), so if away last touched → corner for home
    if (lastTeam === 1 && Date.now() - lastCornerTime > CORNER_COOLDOWN) {
      lastCornerTime = Date.now();
      triggerCornerKick(0, 'top', ball.x < WORLD_W/2 ? 'left' : 'right');
    } else {
      // Goal kick for team 1 (defending)
      ball.x = WORLD_W/2; ball.y = PITCH_T + 30;
      ball.vx = 0; ball.vy = 0; ball.free = true; ball.owner = null;
      addCommentary('default', `Goal kick — ${awayTeamName} to restart.`);
    }
    return;
  }

  if (ball.y > PITCH_B) {
    if (ball.x > GOAL_L && ball.x < GOAL_R) {
      scoreGoal(1); return;
    }
    // Missed — corner or goal kick
    const lastTeam = ball.lastTouchedBy?.team;
    // away attacks toward PITCH_B (team 1), so if home last touched → corner for away
    if (lastTeam === 0 && Date.now() - lastCornerTime > CORNER_COOLDOWN) {
      lastCornerTime = Date.now();
      triggerCornerKick(1, 'bottom', ball.x < WORLD_W/2 ? 'left' : 'right');
    } else {
      ball.x = WORLD_W/2; ball.y = PITCH_B - 30;
      ball.vx = 0; ball.vy = 0; ball.free = true; ball.owner = null;
      addCommentary('default', `Goal kick — ${homeTeamName} to restart.`);
    }
    return;
  }
}

// ---- GOAL ----
function scoreGoal(scoringTeam) {
  const scoringPlayers = scoringTeam === 0 ? homePlayers : awayPlayers;
  const teamName = scoringTeam === 0 ? homeTeamName : awayTeamName;

  // Find who was last to touch/shoot
  let scorer = null;
  // Simple heuristic: nearest player to the goal on scoring side
  const goalY = scoringTeam === 0 ? PITCH_T : PITCH_B;
  let minDist = Infinity;
  for (const p of scoringPlayers) {
    if (p.sentOff || p.position === 'GK') continue;
    const d = dist(p.x, p.y, ball.x, goalY);
    if (d < minDist) { minDist = d; scorer = p; }
  }
  if (!scorer) scorer = scoringPlayers.find(p => !p.sentOff && p.position !== 'GK') || scoringPlayers[0];

  if (scoringTeam === 0) homeScore++; else awayScore++;
  scorer.goals++;
  window.DEBUG_STATS.goals++;
  const minute = Math.floor(matchClock);
  goalScorers.push({ player: scorer, team: teamName, minute });

  AudioManager.playGoal();
  const scorerRoster = findPlayerInRoster(scorer.lastName, scoringTeam);
  const goalVars = {
    scorer: scorer.lastName,
    score: `${homeScore}–${awayScore}`,
    team_nick: TEAM_NICKNAMES[teamName] || teamName,
    scorer_fact: getPlayerFact(scorerRoster),
    team_anecdote: getTeamAnecdote(teamName),
  };
  addCommentary('goal', pickComment('goal', goalVars));

  // Country event hooks on goal/concede
  const concedingTeamName = scoringTeam === 0 ? awayTeamName : homeTeamName;
  const scoringHook = COUNTRY_EVENT_HOOKS?.[teamName];
  const concedingHook = COUNTRY_EVENT_HOOKS?.[concedingTeamName];
  if (scoringHook?.onGoal && Math.random() < 0.65)
    setTimeout(() => addCommentary('comedy', scoringHook.onGoal), 2200);
  if (concedingHook?.onConcede && Math.random() < 0.45)
    setTimeout(() => addCommentary('comedy', concedingHook.onConcede), 3500);

  // Bio hook follow-up for goal scorer
  if (scorer) {
    const rp = findPlayerInRoster(scorer.lastName, scoringTeam);
    if (rp?.bio) {
      const bioLine = matchBioHook(scorer.lastName, rp.bio, 'scores at the World Cup');
      if (bioLine) setTimeout(() => addCommentary('info', bioLine), 1800);
    }
  }

  // Varied celebrations for scoring team
  const celebTypes = ['kneeSlide', 'armsUp', 'cornerFlag', 'shirtPull', 'armsUp'];
  let pileOnCount = 0;
  for (const p of scoringPlayers) {
    if (p.sentOff) continue;
    p.state = 'celebrating';
    p.stateTimer = 90;
    if (p === scorer) {
      // Scorer gets pile-on — teammates converge on them
      p.celebrationType = 'pileOn';
      p.celebPhase = 0;
    } else if (pileOnCount < 2 && dist(p.x, p.y, scorer.x, scorer.y) < 250) {
      // 2 nearest teammates also pile on
      p.celebrationType = 'pileOn';
      p.celebTarget = {x: scorer.x, y: scorer.y};
      p.celebPhase = 0;
      pileOnCount++;
    } else {
      // Others get random celebration
      p.celebrationType = celebTypes[Math.floor(Math.random() * celebTypes.length)];
      p.celebPhase = 0;
      if (p.celebrationType === 'cornerFlag') {
        // Target nearest corner
        const corners = [{x:PITCH_L,y:PITCH_T},{x:PITCH_R,y:PITCH_T},{x:PITCH_L,y:PITCH_B},{x:PITCH_R,y:PITCH_B}];
        let nearestCorner = corners[0], minCD = Infinity;
        for (const c of corners) { const cd = dist(p.x,p.y,c.x,c.y); if (cd < minCD) { minCD = cd; nearestCorner = c; } }
        p.celebTarget = nearestCorner;
      } else if (p.celebrationType === 'kneeSlide') {
        p.celebSlideX = 0;
      }
    }
  }

  // Dejection for conceding team
  const concedingPlayers = scoringTeam === 0 ? awayPlayers : homePlayers;
  const dejectionTypes = ['handsOnHead', 'dropToKnees', 'stareAtGround', 'handsOnHead'];
  let argueCount = 0;
  for (const p of concedingPlayers) {
    if (p.sentOff) continue;
    p.state = 'dejected';
    p.stateTimer = 90;
    p.celebPhase = 0;
    if (argueCount < 2 && p.position !== 'GK' && Math.random() < 0.25) {
      p.dejectionType = 'argueWithRef';
      argueCount++;
    } else if (p.position === 'GK') {
      p.dejectionType = Math.random() < 0.5 ? 'dropToKnees' : 'stareAtGround';
    } else {
      p.dejectionType = dejectionTypes[Math.floor(Math.random() * dejectionTypes.length)];
    }
  }

  // Comedy celebration events with visual effects
  if (Math.random() < 0.4) {
    const celebVars = { scorer: scorer.lastName };
    addCommentary('comedy', pickComment('goal_celebration', celebVars));
    if (Math.random() < 0.5) {
      addEffect('phone', scorer.x, scorer.y);
    } else {
      addEffect('dust', scorer.x, scorer.y, {dir: 1});
      addEffect('dust', scorer.x, scorer.y, {dir: -1});
    }
    comedyStats.selfies++;
    trackPlayerEvent(scorer.name, 'selfies');
  }

  // Reset ball
  ball.x = WORLD_W / 2; ball.y = WORLD_H / 2;
  ball.vx = 0; ball.vy = 0;
  ball.owner = null; ball.free = true;

  // Snap camera toward goal mouth
  const goalCamY = scoringTeam === 0 ? PITCH_T + 100 : PITCH_B - 100;
  snapCamera(WORLD_W / 2, goalCamY);

  gameState = 'goalScored';
  pauseTimer = 120;

  updateScoreboard();
}

// ---- PLAYER AI ----
function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

// Centralized state filter — returns true if player can participate in normal gameplay
function canAct(p) {
  if (p.sentOff) return false;
  const inactiveStates = ['diving','fighting','celebrating','dejected','slacking','walkingOff'];
  return !inactiveStates.includes(p.state);
}

function playerSpeed(caps) {
  // caps 0-200+ → speed 2.0-4.5 (world units per frame)
  return 2.0 + Math.min(caps, 120) / 120 * 2.5;
}

function getChaseRoles(players) {
  const outfield = players.filter(p => p.position !== 'GK' && canAct(p));
  outfield.sort((a, b) => dist(a.x, a.y, ball.x, ball.y) - dist(b.x, b.y, ball.x, ball.y));
  return {
    chaser: outfield[0] || null,
    support: outfield[1] || null,
    holders: outfield.slice(2)
  };
}

function getShiftedHomePos(player, myTeamHasBall, isHomeTeam) {
  const hx = player.homeX, hy = player.homeY;
  const shiftFactor = 0.15;
  const ownGoalY = isHomeTeam ? PITCH_B : PITCH_T;
  const oppGoalY = isHomeTeam ? PITCH_T : PITCH_B;
  let sy = hy;
  if (myTeamHasBall) {
    sy += (oppGoalY - hy) * shiftFactor;
  } else {
    sy += (ownGoalY - hy) * shiftFactor;
  }
  // Widen x-spread by 30% for more use of pitch width
  const cx = WORLD_W / 2;
  const widenedX = cx + (hx - cx) * 1.6; // spread formations VERY wide
  const clampedX = Math.max(PITCH_L + 20, Math.min(PITCH_R - 20, widenedX));
  return { x: clampedX, y: sy };
}

function moveToward(p, tx, ty, speed) {
  const d = dist(p.x, p.y, tx, ty);
  if (d < 2) return;
  p.vx = ((tx - p.x) / d) * speed;
  p.vy = ((ty - p.y) / d) * speed;
}

function findNearestBallChaser(players) {
  let nearest = null, minD = Infinity;
  for (const p of players) {
    if (!canAct(p)) continue;
    const d = dist(p.x, p.y, ball.x, ball.y);
    if (d < minD) { minD = d; nearest = p; }
  }
  return nearest;
}

function findTeammate(p, players) {
  let best = null, bestScore = -Infinity;
  const attackDir = p.team === 0 ? -1 : 1; // -1 = up, 1 = down
  for (const t of players) {
    if (t === p || t.sentOff || t.position === 'GK') continue;
    const ahead = (t.y - p.y) * attackDir;
    const lateral = Math.abs(t.x - p.x);
    const passDist = dist(p.x, p.y, t.x, t.y);
    const space = nearestOpponentDist(t);
    // STRONGLY reward wide players + long passes = outfield play
    const isWide = Math.abs(t.x - WORLD_W / 2) > PW * 0.2;
    const wideBonus = isWide ? 60 : 0;
    const longPassBonus = passDist > 200 ? 30 : (passDist > 100 ? 15 : 0); // reward longer passes
    const centralPenalty = Math.abs(t.x - WORLD_W/2) < PW * 0.1 ? -20 : 0; // penalize center
    const score = ahead * 0.4 + space * 0.3 + lateral * 0.1 + wideBonus + longPassBonus + centralPenalty;
    if (score > bestScore) { bestScore = score; best = t; }
  }
  return best;
}

function nearestOpponentDist(p) {
  const opponents = p.team === 0 ? awayPlayers : homePlayers;
  let minD = Infinity;
  for (const o of opponents) {
    if (o.sentOff) continue;
    const d = dist(p.x, p.y, o.x, o.y);
    if (d < minD) minD = d;
  }
  return minD;
}

function shootBall(p) {
  const goalX = WORLD_W / 2 + (Math.random() - 0.5) * GOAL_W * 0.7;
  const goalY = p.team === 0 ? PITCH_T - 5 : PITCH_B + 5;
  const d = dist(p.x, p.y, goalX, goalY);
  const accuracy = 0.85 + Math.random() * 0.3;
  // Add ±20° angle spread for wider shot variety
  const baseAngle = Math.atan2(goalY - p.y, goalX - p.x);
  const spread = (Math.random() - 0.5) * (Math.PI / 9);
  ball.vx = Math.cos(baseAngle + spread) * SHOOT_SPEED * accuracy;
  ball.vy = Math.sin(baseAngle + spread) * SHOOT_SPEED * accuracy;
  ball.lastTouchedBy = p;
  ball.owner = null;
  ball.free = true;
  p.state = 'idle';
  AudioManager.playKick();

  if (Math.random() < 0.4) {
    addCommentary('default', `${p.lastName} lets fly! ${Math.random() < 0.5 ? 'Powerful effort!' : 'What a strike!'}`);
  }
}

function passBall(p, target) {
  const d = dist(p.x, p.y, target.x, target.y);
  const inaccuracy = (Math.random() - 0.5) * 5; // wider inaccuracy for more lateral play
  ball.vx = ((target.x - p.x) / d) * PASS_SPEED + inaccuracy;
  ball.vy = ((target.y - p.y) / d) * PASS_SPEED + inaccuracy;
  ball.lastTouchedBy = p;
  ball.owner = null;
  ball.free = true;
  p.state = 'idle';
  AudioManager.playKick();
  window.DEBUG_STATS.passes++;

  if (Math.random() < 0.15) {
    addCommentary('default', `${p.lastName} finds ${target.lastName} with a lovely ball.`);
  }
}

// ---- MINIMAP CLICK → DIRECTOR'S CAMERA ----
let minimapZoomTimer = 0; // frames remaining for minimap zoom
let minimapZoomTarget = null; // {x, y}

const IDLE_ANTICS = [
  {emoji: '🚬', label: 'having a smoke'},
  {emoji: '🍺', label: 'drinking a beer'},
  {emoji: '😴', label: 'taking a nap'},
  {emoji: '📱', label: 'checking their phone'},
  {emoji: '🧘', label: 'doing yoga'},
  {emoji: '💅', label: 'fixing their nails'},
  {emoji: '🤳', label: 'taking a selfie'},
  {emoji: '🎸', label: 'air guitar solo'},
  {emoji: '🪩', label: 'dancing'},
  {emoji: '🍿', label: 'eating popcorn'},
  {emoji: '📰', label: 'reading the paper'},
  {emoji: '🎮', label: 'playing on their Switch'},
];

function handleMinimapClick(localX, localY, mmw, mmh) {
  if (gameState !== 'playing') return;

  // Convert minimap coords to world coords
  const targetWX = (localX / mmw) * WORLD_W;
  const targetWY = (localY / mmh) * WORLD_H;

  // Snap camera to clicked area
  minimapZoomTarget = {x: targetWX, y: targetWY};
  minimapZoomTimer = 180; // 3 seconds at 60fps
  snapCamera(targetWX, targetWY);

  // Find idle players in that area (not ball carrier, not chasing, not near ball)
  const allP = [...homePlayers, ...awayPlayers];
  const nearbyIdle = allP.filter(p =>
    canAct(p) &&
    p !== ball.owner &&
    dist(p.x, p.y, targetWX, targetWY) < 250 &&
    dist(p.x, p.y, ball.x, ball.y) > 300
  );

  // Make them do something stupid
  for (const p of nearbyIdle) {
    const antic = IDLE_ANTICS[Math.floor(Math.random() * IDLE_ANTICS.length)];
    p.state = 'slacking';
    p.stateTimer = 160; // ~2.7 seconds
    p.slackEmoji = antic.emoji;
    p.slackLabel = antic.label;

    // Visual effect
    addEffect('player_highlight', p.x, p.y, {duration: 0.5});
  }

  if (nearbyIdle.length > 0) {
    const names = nearbyIdle.slice(0, 2).map(p => p.lastName).join(' and ');
    const antic = nearbyIdle[0].slackLabel;
    addCommentary('comedy', `The camera catches ${names} ${antic} off the ball. Professionalism at its finest.`);
    AudioManager.playComedy();
  }
}

function handlePitchClick(wx, wy) {
  if (gameState !== 'playing') return;
  const allP = [...homePlayers, ...awayPlayers];

  // Check if clicked on a specific player
  const clicked = allP.find(p => !p.sentOff && dist(p.x, p.y, wx, wy) < 22);
  if (clicked) {
    addEffect('player_highlight', clicked.x, clicked.y, {duration: 0.5});
    addCommentary('default', `${clicked.lastName} feels the crowd's energy!`);
    return;
  }

  // During fight: show fist emoji
  const fighting = allP.some(p => p.state === 'fighting');
  if (fighting) {
    addEffect('fist_click', wx, wy, {duration: 0.35});
    AudioManager.playComedy();
    allP.filter(p => p.state === 'fighting').forEach(p => p.stateTimer = Math.min(p.stateTimer + 30, 300));
    return;
  }

  // Direction hint: ball carrier biases toward click for 1 second
  if (ball.owner && ball.owner.team === 0) {
    clickTarget = {x: wx, y: wy, framesLeft: 60};
    addEffect('target_circle', wx, wy, {duration: 1.0});
  }
}

function triggerCornerKick(attackingTeam, goalEnd, side) {
  const cx = side === 'left' ? PITCH_L + 10 : PITCH_R - 10;
  const cy = goalEnd === 'top' ? PITCH_T + 10 : PITCH_B - 10;
  ball.x = cx; ball.y = cy; ball.vx = 0; ball.vy = 0;
  ball.owner = null; ball.free = true;
  const takers = (attackingTeam === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff);
  const defenders = (attackingTeam === 0 ? awayPlayers : homePlayers).filter(p => !p.sentOff);
  const taker = takers.sort((a,b)=>dist(a.x,a.y,cx,cy)-dist(b.x,b.y,cx,cy))[0];
  const tName = attackingTeam === 0 ? homeTeamName : awayTeamName;
  addCommentary('default', `Corner for ${tName}! ${taker?.lastName||''} to deliver...`);
  snapCamera(cx, cy);

  // Defensive positioning — defenders fall back to penalty area
  const goalBoxY = goalEnd === 'top' ? PITCH_T + PH * 0.15 : PITCH_B - PH * 0.15;
  defenders.forEach((p, i) => {
    if (p.position === 'GK') return; // GK stays on line
    if (p.position === 'DF' || i < 5) {
      // Defenders cluster in penalty area
      p.targetX = WORLD_W/2 + (Math.random()-0.5) * 200;
      p.targetY = goalBoxY + (Math.random()-0.5) * 60;
      // Move them toward defensive positions
      const dx = p.targetX - p.x, dy = p.targetY - p.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      p.vx = (dx/d) * p.speed * 0.8;
      p.vy = (dy/d) * p.speed * 0.8;
    }
  });

  // Attackers move into the box for the header
  takers.forEach((p, i) => {
    if (p === taker || p.position === 'GK') return;
    if (p.position === 'FW' || p.position === 'DF' || i < 6) {
      p.targetX = WORLD_W/2 + (Math.random()-0.5) * 180;
      p.targetY = goalBoxY + (Math.random()-0.5) * 80;
    }
  });

  if (taker) {
    taker.x = cx; taker.y = cy + (goalEnd==='top'?15:-15);
    setTimeout(() => {
      if (!ball.free) return;
      const targetX = WORLD_W/2 + (Math.random()-0.5)*150;
      const targetY = goalBoxY;
      const d = dist(cx, cy, targetX, targetY);
      ball.vx = ((targetX-cx)/d)*9;
      ball.vy = ((targetY-cy)/d)*9;
      ball.lastTouchedBy = taker;
      AudioManager.playKick();
    }, 900);
  }
}

function updatePlayerAI(p, teammates, opponents, roles) {
  // Walk-off animation for red-carded player
  if (p.state === 'walkingOff') {
    const dx = p.walkOffTargetX - p.x, dy = p.walkOffTargetY - p.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d > 8) { p.x += (dx/d)*3; p.y += (dy/d)*3; }
    else { p.sentOff = true; } // fully off pitch — stop drawing
    return;
  }
  if (p.sentOff) return;

  // Decrement state timers
  if (p.stateTimer > 0) {
    p.stateTimer--;
    if (p.state === 'diving') {
      p.slideX = Math.sin(p.stateTimer * 0.3) * 3;
      p.slideY = Math.cos(p.stateTimer * 0.3) * 2;
      if (p.stateTimer <= 0) { p.state = 'idle'; p.slideX = 0; p.slideY = 0; }
      return;
    }
    if (p.state === 'fighting') {
      // Flying-to-fight phase: player zooms toward brawl at high speed
      if (p.flyingToFight && p.fightTarget) {
        const d = dist(p.x, p.y, p.fightTarget.x, p.fightTarget.y);
        if (d > 20) {
          // Still flying — drop speed trails
          if (Math.random() < 0.35) addEffect('speed_trail', p.x, p.y, {duration: 0.3});
          return; // velocity already set, let physics move the player
        } else {
          // Arrived at fight — stop and jiggle
          p.flyingToFight = false;
          p.fightTarget = null;
          p.vx = 0; p.vy = 0;
        }
      }
      if (p.stateTimer <= 0) { p.state = 'idle'; p.flyingToFight = false; p.fightTarget = null; }
      return;
    }
    if (p.state === 'slacking') {
      if (p.stateTimer <= 0) { p.state = 'idle'; p.slackEmoji = null; p.slackLabel = null; }
      return;
    }
    if (p.state === 'celebrating') {
      p.celebPhase = (p.celebPhase || 0) + 1;
      // Movement for celebration types
      if (p.celebrationType === 'kneeSlide' && p.celebPhase < 40) {
        p.celebSlideX = (p.celebSlideX || 0) + 1.5; // slide forward
        p.x += 1.5;
      } else if (p.celebrationType === 'cornerFlag' && p.celebTarget) {
        const cd = dist(p.x, p.y, p.celebTarget.x, p.celebTarget.y);
        if (cd > 15) {
          moveToward(p, p.celebTarget.x, p.celebTarget.y, p.speed * 2);
          p.x += p.vx; p.y += p.vy;
        }
      } else if (p.celebrationType === 'pileOn' && p.celebTarget) {
        const cd = dist(p.x, p.y, p.celebTarget.x, p.celebTarget.y);
        if (cd > 15) {
          moveToward(p, p.celebTarget.x, p.celebTarget.y, p.speed * 1.5);
          p.x += p.vx; p.y += p.vy;
        }
      } else if (p.celebrationType === 'armsUp') {
        // Slow random jog
        p.x += (Math.random() - 0.5) * 1.5;
        p.y += (Math.random() - 0.5) * 1.5;
      } else if (p.celebrationType === 'shirtPull') {
        // Stumbling walk
        p.x += (Math.random() - 0.5) * 2;
        p.y += (Math.random() - 0.5) * 1;
      }
      if (p.stateTimer <= 0) { p.state = 'idle'; p.celebrationType = null; p.celebTarget = null; p.celebSlideX = 0; p.celebPhase = 0; }
      return;
    }
    if (p.state === 'dejected') {
      p.celebPhase = (p.celebPhase || 0) + 1;
      // Movement for dejection types
      if (p.dejectionType === 'argueWithRef' && p.celebPhase < 45 && typeof ref !== 'undefined') {
        moveToward(p, ref.x, ref.y, p.speed * 1.5);
        p.x += p.vx; p.y += p.vy;
      }
      // Others: stay still
      if (p.stateTimer <= 0) { p.state = 'idle'; p.dejectionType = null; p.celebPhase = 0; }
      return;
    }
  }

  // Goalkeeper AI
  if (p.position === 'GK') {
    updateGK(p, opponents);
    return;
  }

  const isHomeTeam = p.team === 0;
  const myTeamHasBall = ball.owner && ball.owner.team === p.team;

  // Check if this player has the ball
  if (ball.owner === p) {
    p.state = 'hasBall';
    // Apply click direction bias if active
    if (clickTarget && clickTarget.framesLeft > 0 && p.team === 0) {
      const cdx = clickTarget.x - p.x, cdy = clickTarget.y - p.y;
      const cd = Math.sqrt(cdx*cdx+cdy*cdy)||1;
      p.x += (cdx/cd) * p.speed * 0.3;
      p.y += (cdy/cd) * p.speed * 0.3;
      clickTarget.framesLeft--;
    }
    const attackGoalY = isHomeTeam ? PITCH_T : PITCH_B;
    const distToGoal = dist(p.x, p.y, WORLD_W / 2, attackGoalY);

    // Shooting range — tighter, must be closer and more central
    if (distToGoal < 250 && Math.abs(p.x - WORLD_W / 2) < 180) {
      if (Math.random() < 0.02 + (250 - distToGoal) / 8000) {
        shootBall(p);
        return;
      }
    }

    // Pass to teammate — MUCH more frequent = more outfield play + longer passes
    const tm = findTeammate(p, teammates);
    if (tm && Math.random() < 0.08) {
      passBall(p, tm);
      return;
    }

    // Dribble — lateral movement, NOT pulled to center
    const dribDir = isHomeTeam ? -1 : 1;
    const lateralDrift = Math.sin(Date.now() / 800 + p.number) * 2.5; // weave side to side
    p.vx = lateralDrift + (Math.random() - 0.5) * 2.0; // wider lateral movement
    p.vy = DRIBBLE_SPEED * dribDir + (Math.random() - 0.5) * 0.8;
    return;
  }

  // --- Anti-swarm: role-based movement ---

  // Designated chaser (nearest to ball) — moves aggressively toward ball
  if (roles.chaser === p && !ball.owner) {
    p.state = 'chasing';
    moveToward(p, ball.x, ball.y, p.speed);
    if (dist(p.x, p.y, ball.x, ball.y) < 24) {
      ball.owner = p; ball.lastTouchedBy = p;
      ball.free = false;
      p.state = 'hasBall';
    }
    return;
  }

  // Support runner (2nd nearest) — positions ~80px ahead of ball in attack direction
  if (roles.support === p && !ball.owner) {
    const supportDir = isHomeTeam ? -1 : 1;
    const sx = ball.x + ((ball.x < WORLD_W / 2) ? 60 : -60);
    const sy = ball.y + supportDir * 80;
    moveToward(p, sx, sy, p.speed * 0.7);
    if (dist(p.x, p.y, ball.x, ball.y) < 20) {
      ball.owner = p; ball.lastTouchedBy = p;
      ball.free = false;
      p.state = 'hasBall';
    }
    return;
  }

  // If ball owned by opponent nearby — try to tackle (even formation holders)
  if (ball.owner && ball.owner.team !== p.team) {
    const dToBallCarrier = dist(p.x, p.y, ball.owner.x, ball.owner.y);
    if (dToBallCarrier < 120) {
      moveToward(p, ball.owner.x, ball.owner.y, p.speed * 0.9);
      if (dToBallCarrier < TACKLE_RANGE) {
        attemptTackle(p, ball.owner);
      }
      return;
    }
  }

  // Forward off-ball diagonal runs when teammate has ball
  if (p.position === 'FW' && myTeamHasBall) {
    const runDir = isHomeTeam ? -1 : 1;
    const lateralDir = (p.number % 2 === 0) ? 1 : -1;
    const runX = Math.max(PITCH_L + 20, Math.min(PITCH_R - 20, p.homeX + lateralDir * 40));
    const runY = Math.max(PITCH_T + 20, Math.min(PITCH_B - 20, p.homeY + runDir * 60));
    const dx = runX - p.x, dy = runY - p.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 20) {
      p.vx = (dx / d) * p.speed * 0.5;
      p.vy = (dy / d) * p.speed * 0.5;
    }
    p.state = 'idle';
    return;
  }

  // Formation holders — drift toward shifted home position (elastic spring-back)
  p.state = 'idle';
  const home = getShiftedHomePos(p, myTeamHasBall, isHomeTeam);
  const dx = home.x - p.x, dy = home.y - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  // Stronger pull for defenders (they should NOT crowd the GK)
  const pullStrength = (p.position === 'DF') ? 0.7 : (p.position === 'MF') ? 0.5 : 0.4;
  const pullThreshold = (p.position === 'DF') ? 30 : 60;
  if (d > pullThreshold) {
    p.vx = (dx / d) * p.speed * pullStrength;
    p.vy = (dy / d) * p.speed * pullStrength;
  } else {
    // Small idle jitter near home position
    p.vx = (Math.random() - 0.5) * 0.5;
    p.vy = (Math.random() - 0.5) * 0.5;
  }
}

function updateGK(gk, opponents) {
  const goalY = gk.team === 0 ? PITCH_B - 12 : PITCH_T + 12;
  const goalCenterX = WORLD_W / 2;

  // Track ball laterally
  const targetX = Math.max(GOAL_L + 5, Math.min(GOAL_R - 5, ball.x));

  // Rush out for close balls
  let targetY = goalY;
  const ballDistToGoal = dist(ball.x, ball.y, goalCenterX, goalY);
  if (ballDistToGoal < 240 && !ball.owner) {
    targetY = goalY + (ball.y - goalY) * 0.3;
  }

  moveToward(gk, targetX, targetY, GK_SPEED);

  // Save attempt — if ball heading toward goal fast
  if (!ball.owner && Math.abs(ball.vy) > 3) {
    const goalDir = gk.team === 0 ? 1 : -1; // ball going toward our goal?
    if (ball.vy * goalDir > 0) {
      const timeToGoal = Math.abs((goalY - ball.y) / ball.vy);
      const ballArriveX = ball.x + ball.vx * timeToGoal;
      if (timeToGoal < 30 && ballArriveX > GOAL_L - 20 && ballArriveX < GOAL_R + 20) {
        // Dive!
        moveToward(gk, ballArriveX, ball.y, GK_SPEED * 1.5);
        if (dist(gk.x, gk.y, ball.x, ball.y) < 40) {
          // Save!
          AudioManager.playSave();
          ball.vx = (Math.random() - 0.5) * 6;
          ball.vy = -ball.vy * 0.3;
          ball.owner = null;
          if (Math.random() < 0.3) {
            const shooterName = findNearestPlayerName(opponents, ball.x, ball.y);
            const gkRoster = findPlayerInRoster(gk.lastName, gk.team);
            addCommentary('default', pickComment('shot_saved', { keeper: gk.lastName, keeper_fact: getPlayerFact(gkRoster) }));
          }
        }
      }
    }
  }

  // Pick up ball if close
  if (!ball.owner && dist(gk.x, gk.y, ball.x, ball.y) < 30) {
    ball.owner = gk;
    ball.free = false;
    // Kick it out
    setTimeout(() => {
      if (ball.owner === gk) {
        const tm = findTeammate(gk, gk.team === 0 ? homePlayers : awayPlayers);
        if (tm) passBall(gk, tm);
        else {
          ball.vx = (Math.random() - 0.5) * 8;
          ball.vy = (gk.team === 0 ? -1 : 1) * 10;
          ball.owner = null;
          ball.free = true;
        }
      }
    }, 500);
  }
}

function findNearestPlayerName(players, x, y) {
  let nearest = null, minD = Infinity;
  for (const p of players) {
    if (p.sentOff) continue;
    const d = dist(p.x, p.y, x, y);
    if (d < minD) { minD = d; nearest = p; }
  }
  return nearest ? nearest.lastName : 'someone';
}

// ---- PENALTY BOX CHECK ----
// Returns which team's penalty box contains the point, or -1
// Team 0 (home) defends PITCH_B (bottom), team 1 (away) defends PITCH_T (top)
function inPenaltyBox(x, y) {
  if (x >= PB_X && x <= PB_X + PB_W) {
    // Top penalty box (away's defensive box — team 1 defends here)
    if (y >= PITCH_T && y <= PITCH_T + PB_H) return 1;
    // Bottom penalty box (home's defensive box — team 0 defends here)
    if (y >= PITCH_B - PB_H && y <= PITCH_B) return 0;
  }
  return -1;
}

// ---- PENALTY KICK ----
let penaltyState = null; // { attackingTeam, kicker, keeper, phase, timer }

function triggerPenaltyKick(attackingTeam, fouledPlayer) {
  const defendingTeam = attackingTeam === 0 ? 1 : 0;
  const goalY = attackingTeam === 0 ? PITCH_T : PITCH_B;
  const spotY = attackingTeam === 0 ? PITCH_T + PEN_SPOT_DIST : PITCH_B - PEN_SPOT_DIST;
  const spotX = WORLD_W / 2;

  // Find kicker — the fouled player, or best forward
  const attackers = (attackingTeam === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff);
  let kicker = fouledPlayer || attackers.find(p => p.position === 'FW') || attackers[0];

  // Find keeper
  const defenders = (defendingTeam === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff);
  const keeper = defenders.find(p => p.position === 'GK') || defenders[0];

  // Stop all play
  ball.vx = 0; ball.vy = 0;
  ball.x = spotX; ball.y = spotY;
  ball.owner = null; ball.free = true;

  // Position kicker behind ball
  kicker.x = spotX; kicker.y = spotY + (attackingTeam === 0 ? 40 : -40);
  kicker.vx = 0; kicker.vy = 0; kicker.state = 'idle';

  // Position keeper on goal line
  keeper.x = spotX; keeper.y = goalY + (attackingTeam === 0 ? 5 : -5);
  keeper.vx = 0; keeper.vy = 0; keeper.state = 'idle';

  // Position everyone else behind the penalty arc
  const arcEdgeY = attackingTeam === 0 ? spotY + PEN_SPOT_DIST * 0.7 : spotY - PEN_SPOT_DIST * 0.7;
  const allOthers = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff && p !== kicker && p !== keeper);
  allOthers.forEach((p, i) => {
    p.vx = 0; p.vy = 0;
    // Spread them across the width, behind the penalty arc
    const spread = (i - allOthers.length/2) * 30;
    p.x = Math.max(PITCH_L + 30, Math.min(PITCH_R - 30, spotX + spread));
    p.y = arcEdgeY + (attackingTeam === 0 ? 1 : -1) * (20 + Math.abs(spread) * 0.3);
    p.state = 'idle';
  });

  // Camera focuses on penalty spot
  snapCamera(spotX, spotY);

  // Commentary
  AudioManager.playWhistle(false);
  const kickerRoster = findPlayerInRoster(kicker.lastName, attackingTeam);
  const keeperRoster = findPlayerInRoster(keeper.lastName, defendingTeam);
  const tName = attackingTeam === 0 ? homeTeamName : awayTeamName;
  addCommentary('card', `PENALTY! ${tName} awarded a penalty kick!`);
  setTimeout(() => {
    addCommentary('default', `${kicker.lastName} places the ball on the spot. ${keeper.lastName} bouncing on the line.`);
  }, 1500);

  // Set penalty state — the game loop will handle the kick after a delay
  penaltyState = {
    attackingTeam, kicker, keeper, phase: 'setup', timer: 150, // 2.5 seconds at 60fps
    goalY, spotX, spotY
  };
}

function updatePenaltyKick() {
  if (!penaltyState) return false;
  const ps = penaltyState;

  ps.timer--;

  if (ps.phase === 'setup') {
    // Kicker walks up to ball
    const approachY = ps.spotY + (ps.attackingTeam === 0 ? 8 : -8);
    moveToward(ps.kicker, ps.spotX, approachY, 1.5);
    // Keeper bounces
    ps.keeper.x = ps.spotX + Math.sin(Date.now() / 200) * 20;

    if (ps.timer <= 0) {
      ps.phase = 'kick';
      ps.timer = 10;
    }
    return true; // block normal play
  }

  if (ps.phase === 'kick') {
    if (ps.timer === 10) {
      // THE KICK
      AudioManager.playKick();
      const aimX = ps.spotX + (Math.random() - 0.5) * GOAL_W * 0.8;
      const aimY = ps.goalY + (ps.attackingTeam === 0 ? -5 : 5);
      const d = dist(ps.spotX, ps.spotY, aimX, aimY);
      ball.vx = ((aimX - ps.spotX) / d) * SHOOT_SPEED * 1.2;
      ball.vy = ((aimY - ps.spotY) / d) * SHOOT_SPEED * 1.2;
      ball.lastTouchedBy = ps.kicker;
      ball.owner = null; ball.free = true;
      ps.kicker.state = 'idle';

      // Keeper dive decision — picks a side
      const diveDir = Math.random() < 0.5 ? -1 : 1;
      const diveSpeed = GK_SPEED * 1.8;
      ps.keeper.vx = diveDir * diveSpeed;
      ps.keeper.vy = (ps.goalY - ps.keeper.y) * 0.1;
    }

    ps.timer--;
    if (ps.timer <= 0) {
      ps.phase = 'aftermath';
      ps.timer = 60; // 1 second to let the ball reach the goal or get saved
    }
    return true;
  }

  if (ps.phase === 'aftermath') {
    ps.timer--;
    // Let ball physics + goal detection run normally, but block AI
    updateBall();
    if (ps.timer <= 0) {
      // Penalty sequence over — resume normal play
      penaltyState = null;
      // If ball didn't go in, reset
      if (gameState !== 'goalScored') {
        addCommentary('default', ball.y > PITCH_T && ball.y < PITCH_B ?
          `${ps.keeper.lastName} saves it! What a stop!` :
          `${ps.kicker.lastName} puts it wide! The agony!`);
        AudioManager.playSave();
      }
      return false;
    }
    return true;
  }

  return false;
}

// ---- TACKLING ----
function attemptTackle(tackler, ballCarrier) {
  const roll = Math.random();
  if (roll < 0.4) {
    // Clean tackle
    ball.owner = null;
    ball.free = true;
    ball.vx = (Math.random() - 0.5) * 6;
    ball.vy = (Math.random() - 0.5) * 6;
    ballCarrier.state = 'idle';
  } else if (roll < 0.75) {
    // Foul
    ball.owner = null;
    ball.free = true;
    ball.vx = 0;
    ball.vy = 0;
    ball.x = ballCarrier.x;
    ball.y = ballCarrier.y;
    const minute = Math.floor(matchClock);

    // Check if foul is in the penalty box — PENALTY!
    const boxTeam = inPenaltyBox(ballCarrier.x, ballCarrier.y);
    if (boxTeam !== -1 && boxTeam === tackler.team) {
      // Foul by defender in their own box → penalty to attacker
      const attackingTeam = ballCarrier.team;
      addCommentary('card', `FOUL by ${tackler.lastName} inside the box!`);
      // Card for the foul
      if (Math.random() < 0.35) {
        AudioManager.playCard();
        if (Math.random() < 0.15) {
          addCommentary('card', `RED CARD for ${tackler.lastName}! Last man! Denying a clear goal-scoring opportunity!`);
          tackler.state = 'walkingOff';
          tackler.walkOffTargetX = tackler.x < WORLD_W/2 ? PITCH_L - 50 : PITCH_R + 50;
          tackler.walkOffTargetY = tackler.y;
          comedyStats.redCards++;
          addEffect('red_flash', 0, 0);
        } else {
          addCommentary('card', `Yellow card for ${tackler.lastName}. Cynical challenge.`);
        }
      }
      triggerPenaltyKick(attackingTeam, ballCarrier);
      return; // skip normal foul handling
    }

    addCommentary('card', pickComment('foul', { fouler: tackler.lastName, victim: ballCarrier.lastName }));

    // Card chance
    if (Math.random() < 0.15) {
      AudioManager.playCard();
      addCommentary('card', `Yellow card shown to ${tackler.lastName}!`);
      if (Math.random() < 0.05) {
        addCommentary('card', `That's a SECOND yellow! ${tackler.lastName} is OFF!`);
        tackler.sentOff = true;
        tackler.state = 'sentOff';
        comedyStats.redCards++;
        // Red card: screen flash + player walks off
        addEffect('red_flash', 0, 0);
      }
    }
  } else {
    // Comedy foul — theatrical dive by the victim
    theatricalDive(ballCarrier, tackler);
  }
}

// ---- COMEDY EVENTS ----
function theatricalDive(victim, fouler) {
  AudioManager.playComedy();
  victim.state = 'diving';
  victim.stateTimer = 60;
  const slideDir = (Math.random() > 0.5 ? 1 : -1);
  victim.slideX = slideDir * 40; // 40px slide with rotation
  victim.slideY = -10;
  comedyStats.dives++;
  window.DEBUG_STATS.dives++;
  // Visual effects: stars around victim + slide animation
  addEffect('stars', victim.x, victim.y);
  addEffect('slide', victim.x, victim.y, {dx: slideDir, dy: -0.3, kitColor: victim.shirtColor});
  addEffect('dust', victim.x + slideDir * 30, victim.y, {dir: slideDir});
  // Per-player tracking for escalating commentary
  const pec = trackPlayerEvent(victim.name, 'dives');
  const diverRoster = findPlayerInRoster(victim.lastName, victim.team);
  const diveType = pec.dives >= 3 ? 'dive_hat_trick' : pec.dives >= 2 ? 'dive_repeat' : 'dive';
  const diveVars = {
    player: victim.lastName,
    player_fact: getPlayerFact(diverRoster),
    n: pec.dives,
  };
  addCommentary('comedy', pickComment(diveType, diveVars));
  ball.owner = null;
  ball.free = true;
}

function triggerVAR() {
  if (varActive) return;
  AudioManager.playVAR();
  varActive = true;
  varTimer = 180;
  comedyStats.varReviews++;
  window.DEBUG_STATS.varReviews++;
  // Visual: purple overlay with dashed rectangle on pitch around ball area
  addEffect('var_overlay', ball.x, ball.y, {duration: 3.5});
  addCommentary('var', pickComment('var'));

  const results = [
    'NO GOAL — ball was 0.3mm offside',
    'PENALTY!',
    'NO FOUL — play on',
    'GOAL STANDS — after 4 minutes of squinting',
    'YELLOW CARD UPGRADED TO RED... no wait, downgraded to a stern look',
    'DECISION: referee had something in his eye',
  ];
  varResult = results[Math.floor(Math.random() * results.length)];
}

function triggerMassConfrontation() {
  AudioManager.playComedy();
  comedyStats.fights++;
  window.DEBUG_STATS.fights++;
  triggerComedyCooldown();
  // 8-10 players from both teams involved
  const allP = [...homePlayers, ...awayPlayers].filter(p => !p.sentOff && p.state !== 'sentOff');
  const fighters = allP.sort((a,b) => dist(a.x,a.y,ball.x,ball.y)-dist(b.x,b.y,ball.x,ball.y)).slice(0, Math.min(10, allP.length));
  const cx = ball.x, cy = ball.y;
  for (const p of fighters) {
    p.state = 'fighting';
    p.stateTimer = 300; // 5 seconds at 60fps
    // Launch players at high speed toward fight center (they FLY in)
    const targetX = cx + (Math.random()-0.5)*40;
    const targetY = cy + (Math.random()-0.5)*40;
    const d = dist(p.x, p.y, targetX, targetY);
    if (d > 25) {
      p.flyingToFight = true;
      p.fightTarget = {x: targetX, y: targetY};
      const flySpeed = Math.max(p.speed * 8, 18);
      p.vx = ((targetX - p.x) / d) * flySpeed;
      p.vy = ((targetY - p.y) / d) * flySpeed;
      // Speed trail at launch position
      addEffect('speed_trail', p.x, p.y, {duration: 0.4});
    } else {
      p.flyingToFight = false;
      p.fightTarget = null;
      p.vx = 0; p.vy = 0;
    }
    trackPlayerEvent(p.name, 'fights');
  }
  // Referee runs into fight
  if (typeof ref !== 'undefined') { ref.inFight = true; ref.fightX = cx; ref.fightY = cy; }
  // Visual effects
  addEffect('exclaim', cx, cy);
  addEffect('exclaim', cx - 25, cy + 15);
  addEffect('exclaim', cx + 30, cy - 20);
  const zones = ['halfway line', 'penalty area', 'corner flag', 'centre circle'];
  const fightVars = { zone: zones[Math.floor(Math.random() * zones.length)], fouler: fighters[0]?.lastName || 'Someone' };
  addCommentary('comedy', pickComment('fight', fightVars));
  // After 5 seconds: card decision
  setTimeout(() => {
    if (typeof ref !== 'undefined') ref.inFight = false;
    fighters.forEach(p => { if (p.state === 'fighting') { p.state = 'idle'; p.flyingToFight = false; p.fightTarget = null; } });
    const victim = fighters[Math.floor(Math.random() * fighters.length)];
    if (!victim || victim.sentOff) return;
    const rand = Math.random();
    if (rand < 0.15) {
      // RED CARD
      victim.sentOff = true; victim.state = 'walkingOff';
      victim.walkOffTargetX = victim.x < WORLD_W/2 ? PITCH_L - 50 : PITCH_R + 50;
      victim.walkOffTargetY = victim.y;
      AudioManager.playCard(); AudioManager.playWhistle(false);
      addEffect('red_flash', ball.x, ball.y, {duration: 0.4});
      addCommentary('card', `RED CARD! ${victim.lastName} is given his marching orders! Incredible scenes.`);
      window.DEBUG_STATS.reds = (window.DEBUG_STATS.reds||0)+1;
    } else if (rand < 0.75) {
      AudioManager.playCard();
      addCommentary('card', `Yellow card for ${victim.lastName}. Not the last one tonight, probably.`);
    }
  }, 5000);
}

function triggerKeeperRush(team) {
  const gk = (team === 0 ? homePlayers : awayPlayers).find(p => p.position === 'GK' && !p.sentOff);
  if (!gk) return;
  gk.homeX = WORLD_W / 2;
  gk.homeY = WORLD_H / 2;
  moveToward(gk, WORLD_W / 2 + (Math.random() - 0.5) * 200, WORLD_H / 2, GK_SPEED);
  addCommentary('comedy', pickComment('keeper_rush', { keeper: gk.lastName }));
  setTimeout(() => {
    gk.homeX = WORLD_W / 2;
    gk.homeY = team === 0 ? PITCH_B - 12 : PITCH_T + 12;
  }, 4000);
}

function triggerPitchInvader() {
  comedyStats.pitchInvaders++;
  pitchInvader = {
    x: PITCH_L, y: PITCH_T + Math.random() * PH,
    vx: 5 + Math.random() * 2, vy: (Math.random() - 0.5) * 4,
    timer: 200,
    steward: { x: PITCH_L - 40, y: PITCH_T + PH / 2 }
  };
  // Visual: silhouette zigzagging with steward chase
  addEffect('invader', PITCH_L, PITCH_T + Math.random() * PH);
  addCommentary('comedy', "A pitch invader has breached security! Stewards in pursuit! Players scattering like startled pigeons!");
}

function triggerOwnGoal(team) {
  const defenders = (team === 0 ? homePlayers : awayPlayers).filter(p => p.position === 'DF' && !p.sentOff);
  if (!defenders.length) return;
  const unlucky = defenders[Math.floor(Math.random() * defenders.length)];
  const ownGoalY = team === 0 ? PITCH_B + 5 : PITCH_T - 5;
  ball.x = unlucky.x;
  ball.y = unlucky.y;
  ball.vx = (WORLD_W / 2 - unlucky.x) * 0.05;
  ball.vy = (ownGoalY - unlucky.y) * 0.04;
  ball.owner = null;
  ball.free = true;
  const ogVars = { player: unlucky.lastName, score: `${homeScore}–${awayScore}` };
  addCommentary('comedy', pickComment('own_goal', ogVars));
}

function triggerDoubleRedCard(team) {
  const players = (team === 0 ? homePlayers : awayPlayers).filter(p => !p.sentOff && p.position !== 'GK');
  if (players.length < 2) return;
  AudioManager.playCard();
  const [p1, p2] = players.sort(() => Math.random() - 0.5).slice(0, 2);
  p1.sentOff = true; p1.state = 'sentOff';
  p2.sentOff = true; p2.state = 'sentOff';
  comedyStats.redCards += 2;
  addEffect('red_flash', 0, 0);
  addCommentary('card', `DOUBLE RED CARD! ${p1.lastName} and ${p2.lastName} sent off for fighting EACH OTHER! Same team! Absolute chaos!`);
}

function checkComedyEvents() {
  if (varActive || gameState !== 'playing') return;
  if (!canTriggerComedy()) return; // 10-second cooldown between all comedy events
  const t = matchClock / 90; // progress factor

  // Rates increased 3-5x for more drama — it's COMEDY football
  if (Math.random() < 0.004 * (1 + t)) {
    triggerComedyCooldown();
    const victim = randomPlayer(Math.random() < 0.5 ? homePlayers : awayPlayers);
    const fouler = randomPlayer(Math.random() < 0.5 ? awayPlayers : homePlayers);
    theatricalDive(victim, fouler);
    return;
  }
  if (Math.random() < 0.0015 * (1 + t * 2)) {
    triggerComedyCooldown();
    triggerMassConfrontation();
    return;
  }
  if (Math.random() < 0.001) {
    triggerComedyCooldown();
    triggerKeeperRush(Math.random() < 0.5 ? 0 : 1);
    return;
  }
  if (Math.random() < 0.001 * (1 + t)) {
    triggerComedyCooldown();
    triggerVAR();
    return;
  }
  if (Math.random() < 0.0004) {
    triggerComedyCooldown();
    triggerPitchInvader();
    return;
  }
  if (Math.random() < 0.002) {
    triggerComedyCooldown();
    triggerOwnGoal(Math.random() < 0.5 ? 0 : 1);
    return;
  }
  if (Math.random() < 0.00005) {
    triggerComedyCooldown();
    triggerDoubleRedCard(Math.random() < 0.5 ? 0 : 1);
    return;
  }
}

function randomPlayer(players) {
  const valid = players.filter(p => !p.sentOff && p.state === 'idle');
  return valid.length ? valid[Math.floor(Math.random() * valid.length)] : players[0];
}
